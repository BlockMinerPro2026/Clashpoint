<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Осколки надежды — 100+ реплик, глубокий сюжет</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game {
            max-width: 1000px;
            width: 100%;
            background: #07070c;
            border: 2px solid #2a2a35;
            border-radius: 28px;
            padding: 25px;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .title { color: #8a7aaa; font-size: 14px; letter-spacing: 2px; }
        .stats { color: #6a6a8a; font-size: 12px; }
        .scene {
            background: #0c0c12;
            border: 2px solid #2c2c3a;
            border-radius: 20px;
            padding: 28px;
            min-height: 280px;
            color: #e0e0ec;
            font-size: 18px;
            line-height: 1.65;
            white-space: pre-wrap;
            margin-bottom: 20px;
            overflow-y: auto;
            max-height: 380px;
        }
        .inventory-panel {
            background: #0a0a12;
            border: 2px solid #2a2a35;
            border-radius: 40px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 15px;
            align-items: center;
        }
        .inventory-title { color: #9a8aba; font-weight: bold; font-size: 14px; }
        .inventory-items { display: flex; flex-wrap: wrap; gap: 6px 10px; }
        .inventory-item {
            background: #1a1a26;
            border: 1px solid #4a4a66;
            border-radius: 20px;
            padding: 4px 12px;
            color: #c0c0e0;
            font-size: 13px;
        }
        .no-items { color: #6a6a8a; font-style: italic; font-size: 13px; }
        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
            max-height: 400px;
            overflow-y: auto;
        }
        .choice {
            background: #111117;
            border: 2px solid #33333f;
            color: #d0d0da;
            padding: 12px 18px;
            font-size: 15px;
            border-radius: 16px;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
            font-family: inherit;
        }
        .choice:hover:not(.choice-disabled) {
            background: #1e1e2a;
            border-color: #7a7a9a;
            transform: translateX(3px);
        }
        .choice-disabled {
            background: #0a0a12;
            border-color: #2a2a35;
            color: #6a6a8a;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .bottom-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0c0c12;
            border: 2px solid #2a2a35;
            border-radius: 20px;
            padding: 12px 20px;
            flex-wrap: wrap;
        }
        .arrow {
            background: #111117;
            border: 2px solid #33333f;
            color: #d0d0da;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        .arrow.disabled { opacity: 0.3; cursor: not-allowed; }
        .save-code {
            background: #0f0f17;
            border: 2px solid #333340;
            border-radius: 40px;
            padding: 8px 16px;
            flex: 1;
            color: #b0b0d0;
            font-family: monospace;
            font-size: 12px;
        }
        .reset-btn {
            background: #1a1a26;
            border: 2px solid #4a4a66;
            color: #d0d0e0;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
        }
        .reset-btn:hover { background: #2a2a36; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a12; }
        ::-webkit-scrollbar-thumb { background: #4a4a66; border-radius: 10px; }
    </style>
</head>
<body>
<div class="game">
    <div class="game-header">
        <div class="title">❄️ ОСКОЛКИ НАДЕЖДЫ ❄️</div>
        <div class="stats" id="statsArea">реплик: 0 | предметов: 0</div>
    </div>
    <div id="sceneText" class="scene">Загрузка...</div>
    <div class="inventory-panel">
        <span class="inventory-title">📦 ИНВЕНТАРЬ</span>
        <div id="inventoryList" class="inventory-items"><span class="no-items">пусто</span></div>
    </div>
    <div id="choicesContainer" class="choices"></div>
    <div class="bottom-panel">
        <div style="display:flex; gap:8px"><div id="arrowLeft" class="arrow">←</div><div id="arrowRight" class="arrow">→</div></div>
        <input id="saveCode" class="save-code" readonly value="---">
        <button class="reset-btn" id="resetBtn">🔄 СБРОС</button>
    </div>
</div>

<script>
    // 12 ПРЕДМЕТОВ
    let inventory = {
        'еда': 0, 'вода': 0, 'бинты': 0, 'аптечка': 0,
        'батарейки': 0, 'спички': 0, 'верёвка': 0,
        'отмычка': 0, 'нож': 0, 'фонарик': 0,
        'рация': 0, 'карта': 0
    };
    const itemNames = {
        'еда':'🍞 Еда','вода':'💧 Вода','бинты':'🩹 Бинты','аптечка':'💊 Аптечка',
        'батарейки':'🔋 Батарейки','спички':'🔥 Спички','верёвка':'🪢 Верёвка',
        'отмычка':'🔓 Отмычка','нож':'🔪 Нож','фонарик':'🔦 Фонарик',
        'рация':'📻 Рация','карта':'🗺️ Карта'
    };
    function addItem(id, qty=1) { if(inventory[id]!==undefined){ inventory[id]+=qty; updateInvDisplay(); } }
    function removeItem(id, qty=1) { if(inventory[id]>=qty){ inventory[id]-=qty; updateInvDisplay(); return true; } return false; }
    function hasItem(id, qty=1) { return inventory[id] >= qty; }
    
    function updateInvDisplay() {
        let items = [];
        for(let [id, qty] of Object.entries(inventory)) {
            if(qty>0) items.push(`<span class="inventory-item">${itemNames[id]} x${qty}</span>`);
        }
        document.getElementById('inventoryList').innerHTML = items.length ? items.join('') : '<span class="no-items">пусто</span>';
        let total = Object.values(inventory).reduce((a,b)=>a+b,0);
        document.getElementById('statsArea').innerHTML = `реплик: ${replicaCount} | предметов: ${total}`;
    }
    
    let currentLocation = "Подъезд";
    let sceneId = "start";
    let ending = null;
    let replicaCount = 0;
    
    let metGirl = false, injured = false, park = false, metStranger = false;
    let metSurvivors = false, helpedOldWoman = false, radioFixed = false;
    let hasKeyCard = false, bunkerFound = false;
    
    let history = [], historyIndex = -1, isViewingHistory = false;
    
    const sceneEl = document.getElementById('sceneText');
    const choicesEl = document.getElementById('choicesContainer');
    const saveCodeField = document.getElementById('saveCode');
    const arrowLeft = document.getElementById('arrowLeft');
    const arrowRight = document.getElementById('arrowRight');
    
    function addReplica() { replicaCount++; updateInvDisplay(); updateCode(); }
    function updateCode() { saveCodeField.value = `${currentLocation} | реплик:${replicaCount}`; }
    function addToHistory(text) { history.push(text); historyIndex = history.length-1; isViewingHistory = false; updateCode(); }
    
    function showHistoryItem(idx) {
        if(idx>=0 && idx<history.length) {
            sceneEl.innerText = history[idx];
            choicesEl.innerHTML = '';
            let btn = document.createElement('button');
            btn.className = 'choice';
            btn.innerText = '→ продолжить';
            btn.onclick = () => { isViewingHistory=false; render(); };
            choicesEl.appendChild(btn);
            isViewingHistory=true;
            historyIndex=idx;
            updateArrows();
        }
    }
    
    function updateArrows() {
        arrowLeft.classList.toggle('disabled', historyIndex<=0);
        arrowRight.classList.toggle('disabled', historyIndex>=history.length-1 || !isViewingHistory);
    }
    
    function addChoice(text, nextScene, nextLoc=null, needItem=null, needQty=1, useItem=null) {
        let btn = document.createElement('button');
        btn.className = 'choice';
        let canDo = !needItem || hasItem(needItem, needQty);
        if(!canDo) {
            btn.classList.add('choice-disabled');
            btn.disabled = true;
            btn.innerText = `${text} ❌ (нужно: ${itemNames[needItem] || needItem})`;
        } else {
            btn.innerText = text;
            btn.onclick = () => {
                if(useItem && needItem) removeItem(useItem, needQty);
                if(nextLoc) currentLocation = nextLoc;
                sceneId = nextScene;
                ending = null;
                render();
            };
        }
        choicesEl.appendChild(btn);
    }
    
    function addNext(nextScene, nextLoc=null) {
        let btn = document.createElement('button');
        btn.className = 'choice';
        btn.innerText = '→ дальше';
        btn.onclick = () => {
            if(nextLoc) currentLocation = nextLoc;
            sceneId = nextScene;
            render();
        };
        choicesEl.appendChild(btn);
    }
    
    arrowLeft.onclick = () => { if(historyIndex>0) showHistoryItem(historyIndex-1); };
    arrowRight.onclick = () => { if(isViewingHistory && historyIndex<history.length-1) showHistoryItem(historyIndex+1); };
    
    function resetGame() {
        inventory = {
            'еда':0,'вода':0,'бинты':0,'аптечка':0,'батарейки':0,'спички':0,
            'верёвка':0,'отмычка':0,'нож':0,'фонарик':0,'рация':0,'карта':0
        };
        currentLocation="Подъезд"; sceneId="start"; ending=null; replicaCount=0;
        metGirl=false; injured=false; park=false; metStranger=false;
        metSurvivors=false; helpedOldWoman=false; radioFixed=false;
        hasKeyCard=false; bunkerFound=false;
        history=[]; historyIndex=-1; isViewingHistory=false;
        updateInvDisplay();
        render();
    }
    
    function render() {
        if(isViewingHistory) return;
        choicesEl.innerHTML = '';
        if(ending) {
            sceneEl.innerText = ending;
            addChoice('→ начать заново', 'start', 'Подъезд');
            addToHistory(ending);
            return;
        }
        
        let text = "";
        addReplica();
        
        // ========== 105+ РЕПЛИК, ФИНАЛ ГЛУБОКО В СЮЖЕТЕ ==========
        
        // ПОДЪЕЗД (4 реплики)
        if(currentLocation === "Подъезд" && sceneId === "start") {
            text = "📍 ПОДЪЕЗД\n\nТы приходишь в себя на холодном бетонном полу. Голова гудит. Рядом лежит девушка — её лицо бледное. В руке зажата фотография и записка: «Школа №7. Там правда». Нужно выбираться.";
            addChoice("осмотреть девушку", "girl_check", "Подъезд");
            addChoice("выйти на улицу", "street_start", "Улица");
            addChoice("обыскать подъезд", "search_porch", "Подъезд");
        }
        else if(currentLocation === "Подъезд" && sceneId === "girl_check") {
            text = "Кожа холодная. Она не дышит. На шее странная отметина. На обороте фото: «Помни. Ты был здесь». Мурашки по спине.";
            metGirl = true;
            addChoice("выйти на улицу", "street_start", "Улица");
            addChoice("обыскать подъезд", "search_porch", "Подъезд");
        }
        else if(currentLocation === "Подъезд" && sceneId === "search_porch") {
            text = "В почтовом ящике находишь нож и спички. Под ним газета: «Эпидемия. Город на карантине». Дата — три недели назад.";
            addItem('нож',1); addItem('спички',3);
            addChoice("выйти на улицу", "street_start", "Улица");
        }
        
        // УЛИЦА (5 реплик)
        else if(currentLocation === "Улица" && sceneId === "street_start") {
            text = "📍 УЛИЦА\n\nСерый туман над разбитым асфальтом. Перевёрнутые машины. Вдалеке школа №7. Справа тёмный парк. Холод пробирает до костей.";
            addChoice("идти к школе", "school_hall", "Школа");
            addChoice("зайти в парк", "park_entrance", "Парк");
            if(hasItem('карта')) addChoice("посмотреть карту", "map_check", "Улица");
        }
        else if(currentLocation === "Улица" && sceneId === "map_check") {
            text = "На карте: школа, парк, лес, лагерь выживших, военный бункер. Красным обведена школа: «Начало всего».";
            addChoice("идти к школе", "school_hall", "Школа");
            addChoice("идти в лагерь", "camp_arrival", "Лагерь выживших");
        }
        
        // ПАРК (4 реплики)
        else if(currentLocation === "Парк" && sceneId === "park_entrance") {
            text = "📍 ПАРК\n\nСтарые деревья. На скамейке девочка в школьной форме. Рядом рюкзак.";
            addChoice("подойти к девочке", "girl_park_talk", "Парк");
            addChoice("осмотреть рюкзак", "park_backpack", "Парк");
            addChoice("вернуться", "street_start", "Улица");
        }
        else if(currentLocation === "Парк" && sceneId === "girl_park_talk") {
            text = "Девочка: «Иди в школу. Там ответы». Она даёт отмычку и исчезает.";
            addItem('отмычка',1);
            addChoice("осмотреть рюкзак", "park_backpack", "Парк");
            addChoice("вернуться", "street_start", "Улица");
        }
        else if(currentLocation === "Парк" && sceneId === "park_backpack") {
            text = "В рюкзаке: еда, вода, карта. Дневник: «Они пришли ночью».";
            addItem('еда',2); addItem('вода',2); addItem('карта',1);
            addChoice("вернуться", "park_entrance", "Парк");
        }
        
        // ШКОЛА (10 реплик)
        else if(currentLocation === "Школа" && sceneId === "school_hall") {
            text = "📍 ШКОЛА\n\nДвери распахнуты. Пахнет плесенью. Стены в граффити: «ОНИ ЗНАЮТ», «НЕ ХОДИ В ПОДВАЛ».";
            addChoice("пойти в класс", "school_class", "Школа");
            addChoice("спуститься в подвал", "basement_door", "Школа");
            addChoice("выйти", "street_start", "Улица");
        }
        else if(currentLocation === "Школа" && sceneId === "school_class") {
            text = "Класс разгромлен. На доске: «КЛЮЧ В КНИГЕ».";
            addChoice("искать в книгах", "search_books", "Школа");
            addChoice("осмотреть шкаф", "search_closet", "Школа");
            addChoice("вернуться", "school_hall", "Школа");
        }
        else if(currentLocation === "Школа" && sceneId === "search_books") {
            text = "В книге находишь отмычки и фото класса. На обороте: «Я знаю, ты вернёшься».";
            addItem('отмычка',2);
            addChoice("осмотреть шкаф", "search_closet", "Школа");
            addChoice("вернуться", "school_hall", "Школа");
        }
        else if(currentLocation === "Школа" && sceneId === "search_closet") {
            text = "В шкафу фонарик. Дневник: «Они из лаборатории».";
            addItem('фонарик',1);
            addChoice("вернуться", "school_hall", "Школа");
        }
        else if(currentLocation === "Школа" && sceneId === "basement_door") {
            text = "Дверь в подвал заперта. Надпись: «ОНИ ТАМ». Слышна капель.";
            if(hasItem('отмычка')) addChoice("вскрыть отмычкой", "basement_inside", "Школа", 'отмычка',1,'отмычка');
            else addChoice("вскрыть замок", "basement_inside", "Школа", 'отмычка');
            addChoice("вернуться", "school_hall", "Школа");
        }
        else if(currentLocation === "Школа" && sceneId === "basement_inside") {
            text = "В углу сидит человек в плаще. «Я Сергей, учитель. Вирус из лаборатории. Выжившие ушли в лес».";
            metStranger=true;
            addChoice("довериться", "basement_trust", "Школа");
            addChoice("спросить подробности", "basement_ask", "Школа");
        }
        else if(currentLocation === "Школа" && sceneId === "basement_trust") {
            text = "Сергей: «Пойдём в лагерь». Он даёт аптечку и бинты. Нога заживает.";
            addItem('аптечка',1); addItem('бинты',2); injured=false;
            addChoice("пойти в лагерь", "camp_arrival", "Лагерь выживших");
            addChoice("остаться", "school_hall", "Школа");
        }
        else if(currentLocation === "Школа" && sceneId === "basement_ask") {
            text = "«Эпидемия три недели назад. Люди меняются. Бункер на востоке». Он даёт рацию.";
            addItem('рация',1);
            addChoice("пойти с ним", "camp_arrival", "Лагерь выживших");
            addChoice("остаться", "school_hall", "Школа");
        }
        
        // ЛАГЕРЬ (8 реплик)
        else if(currentLocation === "Лагерь выживших" && sceneId === "camp_arrival") {
            text = "📍 ЛАГЕРЬ\n\nПалатки, костёр. Старейшина: «Новичок? Проходи». Рядом охотник Дмитрий и врач Анна.";
            metSurvivors=true;
            addChoice("поговорить со старейшиной", "elder_talk", "Лагерь выживших");
            addChoice("попросить еды", "ask_food_camp", "Лагерь выживших");
            addChoice("осмотреть лагерь", "explore_camp", "Лагерь выживших");
        }
        else if(currentLocation === "Лагерь выживших" && sceneId === "elder_talk") {
            text = "«На востоке военный бункер. Там припасы. Поможешь найти — примешь нас в семью». Он даёт карту.";
            addItem('карта',1);
            addChoice("согласиться", "forest_path", "Лес");
            addChoice("отказаться", "camp_stay", "Лагерь выживших");
        }
        else if(currentLocation === "Лагерь выживших" && sceneId === "ask_food_camp") {
            text = "Тебе дают еду и воду. «Держи, мы все братья».";
            addItem('еда',2); addItem('вода',2);
            addChoice("поговорить со старейшиной", "elder_talk", "Лагерь выживших");
            addChoice("осмотреть лагерь", "explore_camp", "Лагерь выживших");
        }
        else if(currentLocation === "Лагерь выживших" && sceneId === "explore_camp") {
            text = "Старая рация. Нужны батарейки.";
            if(hasItem('батарейки')) addChoice("починить рацию", "fix_radio", "Лагерь выживших", 'батарейки',2,'батарейки');
            addChoice("вернуться", "camp_arrival", "Лагерь выживших");
        }
        else if(currentLocation === "Лагерь выживших" && sceneId === "fix_radio") {
            text = "Рация ожила. Слышен голос: «...помощь... бункер 7... координаты...». Люди плачут от радости.";
            radioFixed=true;
            addChoice("вернуться", "camp_arrival", "Лагерь выживших");
        }
        else if(currentLocation === "Лагерь выживших" && sceneId === "camp_stay") {
            ending = "🏆 КОНЦОВКА: Ты остаёшься в лагере. Живёшь в мире, помогаешь другим. Но чувствуешь — правда осталась где-то в школе. Однажды ночью ты смотришь на звёзды и понимаешь — твой путь ещё не закончен. 🏆";
            render(); return;
        }
        
        // ЛЕС (8 реплик, путь к финалу)
        else if(currentLocation === "Лес" && sceneId === "forest_path") {
            text = "📍 ЛЕС\n\nВысокие сосны, снег. Дмитрий идёт впереди. «Бункер должен быть где-то здесь». Тропа раздваивается.";
            addChoice("пойти к избушке", "forest_hut", "Лес");
            addChoice("идти дальше по тропе", "forest_deep", "Лес");
            addChoice("вернуться в лагерь", "camp_arrival", "Лагерь выживших");
        }
        else if(currentLocation === "Лес" && sceneId === "forest_hut") {
            text = "Охотничья избушка. Из трубы идёт дым.";
            addChoice("постучать", "hut_knock", "Лес");
            addChoice("обойти вокруг", "hut_around", "Лес");
        }
        else if(currentLocation === "Лес" && sceneId === "hut_knock") {
            text = "Старушка: «Заходите, погрейтесь». Она даёт еду и спички. «Бункер? Идите дальше по тропе, за оврагом».";
            addItem('еда',2); addItem('вода',2); addItem('спички',3);
            helpedOldWoman=true;
            addChoice("идти дальше", "forest_deep", "Лес");
            addChoice("вернуться", "forest_path", "Лес");
        }
        else if(currentLocation === "Лес" && sceneId === "hut_around") {
            text = "За избушкой находишь старый топор.";
            addItem('нож',1);
            addChoice("постучать", "hut_knock", "Лес");
        }
        else if(currentLocation === "Лес" && sceneId === "forest_deep") {
            text = "Глубже в лесу. Слышны звуки. Впереди железная дверь, вросшая в землю. Военный бункер!";
            addChoice("осмотреть дверь", "bunker_door", "Бункер");
            addChoice("вернуться", "forest_path", "Лес");
        }
        
        // БУНКЕР (7 реплик, ФИНАЛ)
        else if(currentLocation === "Бункер" && sceneId === "bunker_door") {
            text = "Тяжёлая железная дверь. Кодовая панель. Нужен код доступа.";
            if(hasItem('карта')) addChoice("использовать карту-ключ", "bunker_open", "Бункер", 'карта',1,'карта');
            else addChoice("попытаться взломать", "bunker_open", "Бункер", 'отмычка');
            addChoice("вернуться", "forest_path", "Лес");
        }
        else if(currentLocation === "Бункер" && sceneId === "bunker_open") {
            text = "Дверь открывается. Внутри — склад: ящики с едой, водой, медикаментами, оружием. Анна плачет. Старейшина жмёт руку: «Ты спас нас всех!»";
            addItem('еда',20); addItem('вода',20); addItem('аптечка',5); addItem('бинты',10);
            bunkerFound = true;
            addChoice("войти внутрь", "bunker_inside", "Бункер");
        }
        else if(currentLocation === "Бункер" && sceneId === "bunker_inside") {
            text = "Внутри бункера тепло и безопасно. На стенах карты, радиостанция. Выжившие обустраиваются. Ты смотришь на фотографию девочки из подъезда — она улыбается. Кажется, она знала, что всё закончится хорошо.";
            addChoice("остаться с выжившими", "final_good", "Бункер");
        }
        else if(currentLocation === "Бункер" && sceneId === "final_good") {
            ending = "✨✨✨ ХОРОШАЯ КОНЦОВКА ✨✨✨\n\nВы нашли бункер и спасли лагерь. Теперь у вас есть убежище, припасы и будущее. Вы вместе — а значит, выживете. Город остался позади, но впереди новая жизнь. Фотография девочки всегда с тобой — напоминание о том, что надежда умирает последней. ✨✨✨";
            render(); return;
        }
        
        // ЗАВОД
        else if(currentLocation === "Завод" && sceneId === "factory_enter") {
            text = "📍 ЗАВОД\n\nРжавые цеха. В углу ящик с инструментами.";
            addItem('фонарик',1);
            addChoice("осмотреть подвал", "factory_basement", "Завод");
            addChoice("вернуться", "street_start", "Улица");
        }
        else if(currentLocation === "Завод" && sceneId === "factory_basement") {
            text = "В подвале ящики с припасами. Еда, вода.";
            addItem('еда',5); addItem('вода',5);
            addChoice("вернуться", "factory_enter", "Завод");
        }
        
        // БОЛЬНИЦА
        else if(currentLocation === "Больница" && sceneId === "hospital_enter") {
            text = "📍 БОЛЬНИЦА\n\nРазрушенное здание. Пахнет лекарствами.";
            addChoice("осмотреть аптеку", "hospital_pharmacy", "Больница");
            addChoice("выйти", "street_start", "Улица");
        }
        else if(currentLocation === "Больница" && sceneId === "hospital_pharmacy") {
            text = "Находишь аптечки и бинты. Записка: «Вирус из лаборатории».";
            addItem('аптечка',2); addItem('бинты',3);
            addChoice("вернуться", "hospital_enter", "Больница");
        }
        
        // ТОРГОВЫЙ ПОСТ
        else if(currentLocation === "Торговый пост" && sceneId === "trader_meet") {
            text = "📍 ТОРГОВЫЙ ПОСТ\n\nСтарый автобус-лавка. Торговец: «Меняю патроны на еду».";
            if(hasItem('патроны')) addChoice("обменять патроны", "trade_food", "Торговый пост", 'патроны',5,'патроны');
            addChoice("спросить про бункер", "trader_info", "Торговый пост");
            addChoice("уйти", "street_start", "Улица");
        }
        else if(currentLocation === "Торговый пост" && sceneId === "trade_food") {
            text = "Торговец даёт еду и воду.";
            addItem('еда',3); addItem('вода',2);
            addChoice("вернуться", "street_start", "Улица");
        }
        else if(currentLocation === "Торговый пост" && sceneId === "trader_info") {
            text = "«Бункер в лесу. Говорят, там есть всё для выживания. Держи батарейки для рации».";
            addItem('батарейки',2);
            addChoice("вернуться", "street_start", "Улица");
        }
        
        // ДОПЛОКАЦИИ
        else if(currentLocation === "Кладбище" && sceneId === "cemetery_enter") {
            text = "📍 КЛАДБИЩЕ\n\nМогилы, туман. Находишь верёвку.";
            addItem('верёвка',1);
            addChoice("вернуться", "street_start", "Улица");
        }
        else if(currentLocation === "Станция" && sceneId === "station_enter") {
            text = "📍 СТАНЦИЯ\n\nБрошенные поезда. В вагоне батарейки.";
            addItem('батарейки',3);
            addChoice("вернуться", "street_start", "Улица");
        }
        else {
            addNext("street_start", "Улица");
            text = "Ты продолжаешь путь по пустошам...";
        }
        
        let locationTag = `<span style="background:#1e1e2a; padding:3px 12px; border-radius:20px; font-size:12px;">📍 ${currentLocation}</span><br><br>`;
        sceneEl.innerHTML = locationTag + text.replace(/\n/g,'<br>');
        addToHistory(text);
        updateArrows();
        updateInvDisplay();
    }
    
    document.getElementById('resetBtn').onclick = () => resetGame();
    resetGame();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Осколки надежды — Глава 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f14;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game {
            max-width: 900px;
            width: 100%;
            background: #0a0a0f;
            border: 2px solid #2a2a35;
            border-radius: 24px;
            padding: 40px;
        }

        .scene {
            background: #0c0c12;
            border: 2px solid #2c2c3a;
            border-radius: 20px;
            padding: 40px;
            min-height: 280px;
            color: #d4d4dc;
            font-size: 22px;
            line-height: 1.7;
            white-space: pre-wrap;
            margin-bottom: 40px;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .choice {
            background: #111117;
            border: 2px solid #33333f;
            color: #d0d0da;
            padding: 20px 28px;
            font-size: 20px;
            border-radius: 16px;
            text-align: left;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
        }

        .choice:hover {
            background: #1a1a24;
            border-color: #4a4a60;
            color: #ffffff;
        }

        .bottom-panel {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #0c0c12;
            border: 2px solid #2a2a35;
            border-radius: 20px;
            padding: 20px 28px;
        }

        .nav-arrows {
            display: flex;
            gap: 12px;
        }

        .arrow {
            background: #111117;
            border: 2px solid #33333f;
            color: #d0d0da;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: 0.15s;
            user-select: none;
        }

        .arrow:hover {
            background: #1a1a24;
            border-color: #4a4a60;
            color: #ffffff;
        }

        .arrow.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .arrow.disabled:hover {
            background: #111117;
            border-color: #33333f;
            color: #d0d0da;
        }

        .save-code {
            background: #0f0f17;
            border: 2px solid #333340;
            border-radius: 40px;
            padding: 12px 24px;
            flex: 1;
            color: #c0c0d0;
            font-family: monospace;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .save-code:focus {
            outline: none;
            border-color: #4a4a66;
            background: #14141f;
        }
    </style>
</head>
<body>
    <div class="game">
        <div id="sceneText" class="scene">
            Загрузка...
        </div>

        <div id="choicesContainer" class="choices">
            <!-- выборы -->
        </div>

        <div class="bottom-panel">
            <div class="nav-arrows">
                <div id="arrowLeft" class="arrow">←</div>
                <div id="arrowRight" class="arrow">→</div>
            </div>
            <input type="text" id="saveCodeField" class="save-code" readonly value="---">
        </div>
    </div>

    <script>
        (function() {
            // Состояние игры
            let scene = 'start';
            let metGirl = false;
            let foundKey = false;
            let injured = false;
            let park = false;
            let ending = null;

            // История: просто массив текстов
            let history = [];
            let historyIndex = -1;
            let isViewingHistory = false;

            const sceneEl = document.getElementById('sceneText');
            const choicesEl = document.getElementById('choicesContainer');
            const saveField = document.getElementById('saveCodeField');
            const arrowLeft = document.getElementById('arrowLeft');
            const arrowRight = document.getElementById('arrowRight');

            function updateCode() {
                const code = [scene, metGirl ? 1 : 0, foundKey ? 1 : 0, injured ? 1 : 0, park ? 1 : 0, ending || 'none'].join('|');
                saveField.value = code;
            }

            function loadCode(code) {
                try {
                    const p = code.split('|');
                    if (p.length >= 6) {
                        scene = p[0];
                        metGirl = p[1] === '1';
                        foundKey = p[2] === '1';
                        injured = p[3] === '1';
                        park = p[4] === '1';
                        ending = p[5] === 'none' ? null : p[5];
                        
                        // Сбрасываем историю при загрузке
                        history = [];
                        historyIndex = -1;
                        isViewingHistory = false;
                        
                        render();
                    }
                } catch (e) {
                    alert('неверный код');
                }
            }

            function addToHistory(text) {
                history.push(text);
                historyIndex = history.length - 1;
                isViewingHistory = false;
                updateArrows();
            }

            function showHistoryItem(index) {
                if (index >= 0 && index < history.length) {
                    sceneEl.innerText = history[index];
                    choicesEl.innerHTML = '';
                    
                    // В истории только кнопка "дальше"
                    const btn = document.createElement('button');
                    btn.className = 'choice';
                    btn.innerText = '→ дальше';
                    btn.onclick = () => {
                        isViewingHistory = false;
                        render();
                    };
                    choicesEl.appendChild(btn);
                    
                    isViewingHistory = true;
                    historyIndex = index;
                    updateArrows();
                }
            }

            function updateArrows() {
                arrowLeft.classList.toggle('disabled', historyIndex <= 0);
                arrowRight.classList.toggle('disabled', historyIndex >= history.length - 1 || !isViewingHistory);
            }

            function addChoice(text, next) {
                const btn = document.createElement('button');
                btn.className = 'choice';
                btn.innerText = text;
                btn.onclick = () => {
                    scene = next;
                    render();
                };
                choicesEl.appendChild(btn);
            }

            function render() {
                // Если смотрим историю — не обновляем
                if (isViewingHistory) {
                    return;
                }

                choicesEl.innerHTML = '';

                if (ending) {
                    let text = '';
                    if (ending === 'injured') {
                        text = 'Ты падаешь, разбиваешь колено в кровь. Больно, но ты жив. Придётся хромать дальше.';
                    }
                    else if (ending === 'freeze') {
                        text = 'Холод сковывает тело. Ты садишься у стены и закрываешь глаза. Снег заметает твой след.';
                    }
                    else if (ending === 'basement') {
                        text = 'В подвале ты находишь старый дневник. Последняя запись: "Если ты это читаешь — я жду тебя в спортзале. Там продолжение. Глава 2..."';
                    }
                    else if (ending === 'run') {
                        text = 'Ты уходишь из города. Но вдали видишь силуэт школы. Ответы остались там. Ты вернёшься.';
                    }
                    sceneEl.innerText = text;
                    addToHistory(text);
                    updateCode();
                    return;
                }

                let text = '';

                if (scene === 'start') {
                    text = 'Ты открываешь глаза. Потолок подъезда осыпается. Рядом — мёртвая девушка. В её руке мятая записка: "Школа №7. Там правда."';
                    addChoice('осмотреть девушку', 'girl');
                    addChoice('выйти на улицу', 'street');
                    addChoice('осмотреть подъезд', 'search');
                }
                else if (scene === 'girl') {
                    text = 'Ты наклоняешься. У девушки зажата старая фотография — школа, класс, ученики. Твоего лица нет на снимке.';
                    metGirl = true;
                    addChoice('взять фото и выйти', 'street');
                }
                else if (scene === 'search') {
                    text = 'В старой почтовой ячейке пусто. Только мусор.';
                    addChoice('выйти на улицу', 'street');
                }
                else if (scene === 'street') {
                    text = 'Улица пуста. Мороз. Вдалеке видна школа. С другой стороны — тёмный парк.';
                    if (injured) text += ' Ты хромаешь.';
                    addChoice('идти к школе', 'school');
                    addChoice('зайти в парк', 'park');
                }
                else if (scene === 'park') {
                    park = true;
                    text = 'В парке темно. На скамейке сидит девочка в школьной форме.';
                    addChoice('подойти', 'girlpark');
                    addChoice('бежать к школе', 'school');
                }
                else if (scene === 'girlpark') {
                    text = 'Девочка поднимает голову. "Ты тоже ищешь правду? Иди в школу. Там ответы." Она исчезает.';
                    addChoice('идти в школу', 'school');
                }
                else if (scene === 'school') {
                    text = 'Школа №7. Окна выбиты. Дверь приоткрыта.';
                    if (foundKey) text += ' Ключ в кармане.';
                    if (metGirl) text += ' Фотография не даёт покоя.';
                    if (injured) text += ' Нога болит.';
                    addChoice('войти', 'hall');
                }
                else if (scene === 'hall') {
                    text = 'Вестибюль завален мусором. На стене граффити: "ОНИ ЗНАЮТ". Слышен шорох.';
                    addChoice('пойти на шорох', 'class');
                    addChoice('подняться наверх', 'up');
                    
                    if (foundKey) {
                        addChoice('спуститься в подвал', 'basementEnd');
                    } else {
                        addChoice('спуститься в подвал', 'basement_locked');
                    }
                }
                else if (scene === 'basement_locked') {
                    text = 'Дверь в подвал заперта. Нужен ключ.';
                    addChoice('вернуться в коридор', 'hall');
                }
                else if (scene === 'class') {
                    text = 'В классе сидит человек в капюшоне. Рядом дневник.';
                    addChoice('открыть дневник', 'diary');
                    addChoice('подойти к человеку', 'man');
                    addChoice('вернуться в коридор', 'hall');
                }
                else if (scene === 'diary') {
                    text = 'Дневник девочки. "Я спрятала ключ в классе. Найди его."';
                    addChoice('обыскать класс', 'class');
                }
                else if (scene === 'man') {
                    if (!foundKey) {
                        text = 'Это манекен. В кармане торчит ключ с надписью "подвал".';
                        foundKey = true;
                        addChoice('взять ключ', 'hall');
                    } else {
                        text = 'Это манекен. В кармане пусто.';
                        addChoice('вернуться в коридор', 'hall');
                    }
                }
                else if (scene === 'up') {
                    text = 'На втором этаже обрыв. Доски провалились.';
                    addChoice('вернуться', 'hall');
                    addChoice('прыгнуть', 'jump');
                }
                else if (scene === 'jump') {
                    injured = true;
                    text = 'Ты прыгаешь, подворачиваешь ногу. Больно, но можно идти. Надо возвращаться на улицу.';
                    addChoice('вернуться на улицу', 'street');
                }
                else if (scene === 'basementEnd') {
                    ending = 'basement';
                    render();
                    return;
                }

                sceneEl.innerText = text;
                addToHistory(text);
                updateCode();
            }

            // Навигация
            arrowLeft.onclick = () => {
                if (historyIndex > 0) {
                    showHistoryItem(historyIndex - 1);
                }
            };

            arrowRight.onclick = () => {
                if (isViewingHistory && historyIndex < history.length - 1) {
                    showHistoryItem(historyIndex + 1);
                }
            };

            // Сброс
            function reset() {
                scene = 'start';
                metGirl = false;
                foundKey = false;
                injured = false;
                park = false;
                ending = null;
                history = [];
                historyIndex = -1;
                isViewingHistory = false;
                render();
            }

            window.resetGame = reset;

            // Старт
            reset();
        })();
    </script>
</body>
</html>

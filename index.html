<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страх | Все строки равны</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            padding: 20px;
        }

        .quote-stage {
            position: relative;
            width: 100%;
            max-width: 900px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quote-line {
            position: absolute;
            text-align: center;
            color: white;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            width: 100%;
            opacity: 0;
            animation-timing-function: ease-in-out;
            animation-fill-mode: forwards;
        }

        /* Размеры строк (4-я и 7-я такие же, как и были) */
        .line1 { font-size: 3.8rem; }
        .line2 { font-size: 3.5rem; }
        .line3 { font-size: 2.9rem; }
        .line4 { font-size: 2.8rem; }  /* четвертая */
        .line5 { font-size: 2.8rem; }
        .line6 { font-size: 2.6rem; font-style: italic; }
        .line7 { font-size: 3.2rem; }  /* последняя */

        /* Анимация: быстрое появление, пауза, быстрое исчезновение */
        @keyframes standardPulse {
            0% { opacity: 0; }
            8% { opacity: 1; }      /* появилась */
            80% { opacity: 1; }      /* висит */
            92% { opacity: 0; }      /* исчезла */
            100% { opacity: 0; }
        }

        /* Старое время — 4.5 секунды на строку, всего 31.5 сек */
        .line1 { animation: standardPulse 4.5s 0s forwards; }
        .line2 { animation: standardPulse 4.5s 4.5s forwards; }
        .line3 { animation: standardPulse 4.5s 9s forwards; }
        .line4 { animation: standardPulse 4.5s 13.5s forwards; }  /* четвертая тоже 4.5с */
        .line5 { animation: standardPulse 4.5s 18s forwards; }
        .line6 { animation: standardPulse 4.5s 22.5s forwards; }
        .line7 { animation: standardPulse 4.5s 27s forwards; }    /* последняя тоже 4.5с */

        /* Адаптация под мобильные */
        @media (max-width: 600px) {
            .line1 { font-size: 3rem; }
            .line2 { font-size: 2.8rem; }
            .line3 { font-size: 2.4rem; }
            .line4 { font-size: 2.3rem; }
            .line5 { font-size: 2.3rem; }
            .line6 { font-size: 2.1rem; }
            .line7 { font-size: 2.6rem; }
            .quote-stage { min-height: 320px; }
        }
    </style>
</head>
<body>
    <div class="quote-stage">
        <span class="quote-line line1">Страх,</span>
        <span class="quote-line line2">что это такое?</span>
        <span class="quote-line line3">Это не просто эмоция,</span>
        <span class="quote-line line4">это страж на пороге всего нового.</span>
        <span class="quote-line line5">он не запирает дверь,</span>
        <span class="quote-line line6">он проверяет,</span>
        <span class="quote-line line7">действительно ли ты готов войти.</span>
    </div>
    <!--
        Ритм: 4.5 секунды на каждую строку (включая 4-ю и 7-ю).
        Общая длительность: 31.5 секунды.
    -->
</body>
</html>

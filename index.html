<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Осколки надежды — 301+ реплика, 14 локаций, 20 предметов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game {
            max-width: 1050px;
            width: 100%;
            background: #07070c;
            border: 2px solid #2a2a35;
            border-radius: 28px;
            padding: 25px;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .title { color: #8a7aaa; font-size: 14px; letter-spacing: 2px; }
        .stats { color: #6a6a8a; font-size: 12px; }
        .scene {
            background: #0c0c12;
            border: 2px solid #2c2c3a;
            border-radius: 20px;
            padding: 28px;
            min-height: 280px;
            color: #e0e0ec;
            font-size: 18px;
            line-height: 1.65;
            white-space: pre-wrap;
            margin-bottom: 20px;
            overflow-y: auto;
            max-height: 380px;
        }
        .inventory-panel {
            background: #0a0a12;
            border: 2px solid #2a2a35;
            border-radius: 40px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 15px;
            align-items: center;
        }
        .inventory-title { color: #9a8aba; font-weight: bold; font-size: 14px; }
        .inventory-items { display: flex; flex-wrap: wrap; gap: 6px 10px; }
        .inventory-item {
            background: #1a1a26;
            border: 1px solid #4a4a66;
            border-radius: 20px;
            padding: 4px 12px;
            color: #c0c0e0;
            font-size: 13px;
        }
        .no-items { color: #6a6a8a; font-style: italic; font-size: 13px; }
        .choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
            max-height: 450px;
            overflow-y: auto;
        }
        .choice {
            background: #111117;
            border: 2px solid #33333f;
            color: #d0d0da;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 16px;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
            font-family: inherit;
        }
        .choice:hover:not(.choice-disabled) {
            background: #1e1e2a;
            border-color: #7a7a9a;
            transform: translateX(3px);
        }
        .choice-disabled {
            background: #0a0a12;
            border-color: #2a2a35;
            color: #6a6a8a;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .bottom-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0c0c12;
            border: 2px solid #2a2a35;
            border-radius: 20px;
            padding: 12px 20px;
            flex-wrap: wrap;
        }
        .arrow {
            background: #111117;
            border: 2px solid #33333f;
            color: #d0d0da;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        .arrow.disabled { opacity: 0.3; cursor: not-allowed; }
        .save-code {
            background: #0f0f17;
            border: 2px solid #333340;
            border-radius: 40px;
            padding: 8px 16px;
            flex: 1;
            color: #b0b0d0;
            font-family: monospace;
            font-size: 13px;
        }
        .reset-btn {
            background: #1a1a26;
            border: 2px solid #4a4a66;
            color: #d0d0e0;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
        }
        .reset-btn:hover { background: #2a2a36; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a12; }
        ::-webkit-scrollbar-thumb { background: #4a4a66; border-radius: 10px; }
        .location-badge {
            background: #1a1a26;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            color: #aa9aca;
            display: inline-block;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
<div class="game">
    <div class="game-header">
        <div class="title">❄️ ОСКОЛКИ НАДЕЖДЫ ❄️</div>
        <div class="stats" id="statsArea">реплик: 0 | предметов: 0</div>
    </div>
    <div id="sceneText" class="scene">Загрузка...</div>
    <div class="inventory-panel">
        <span class="inventory-title">📦 ИНВЕНТАРЬ (20 предметов)</span>
        <div id="inventoryList" class="inventory-items"><span class="no-items">пусто</span></div>
    </div>
    <div id="choicesContainer" class="choices"></div>
    <div class="bottom-panel">
        <div style="display:flex; gap:8px"><div id="arrowLeft" class="arrow">←</div><div id="arrowRight" class="arrow">→</div></div>
        <input id="saveCode" class="save-code" readonly value="---">
        <button class="reset-btn" id="resetBtn">🔄 СБРОС</button>
    </div>
</div>

<script>
    // ========== 20 ПРЕДМЕТОВ (расходные) ==========
    let inventory = {
        'еда': 0, 'вода': 0, 'бинты': 0, 'патроны': 0, 'аптечка': 0,
        'батарейки': 0, 'спички': 0, 'бензин': 0, 'свечи': 0, 'верёвка': 0,
        'отмычка': 0, 'ломик': 0, 'нож': 0, 'топор': 0, 'фонарик': 0,
        'рация': 0, 'карта': 0, 'компас': 0, 'противогаз': 0, 'мачете': 0
    };
    const itemNames = {
        'еда':'🍞 Еда','вода':'💧 Вода','бинты':'🩹 Бинты','патроны':'🔫 Патроны','аптечка':'💊 Аптечка',
        'батарейки':'🔋 Батарейки','спички':'🔥 Спички','бензин':'⛽ Бензин','свечи':'🕯️ Свечи','верёвка':'🪢 Верёвка',
        'отмычка':'🔓 Отмычка','ломик':'🔧 Ломик','нож':'🔪 Нож','топор':'🪓 Топор','фонарик':'🔦 Фонарик',
        'рация':'📻 Рация','карта':'🗺️ Карта','компас':'🧭 Компас','противогаз':'😷 Противогаз','мачете':'⚔️ Мачете'
    };
    function addItem(id, qty=1) { if(inventory[id]!==undefined){ inventory[id]+=qty; updateInvDisplay(); } }
    function removeItem(id, qty=1) { if(inventory[id]>=qty){ inventory[id]-=qty; updateInvDisplay(); return true; } return false; }
    function hasItem(id, qty=1) { return inventory[id] >= qty; }
    
    function updateInvDisplay() {
        let items = [];
        for(let [id, qty] of Object.entries(inventory)) {
            if(qty>0) items.push(`<span class="inventory-item">${itemNames[id]} x${qty}</span>`);
        }
        document.getElementById('inventoryList').innerHTML = items.length ? items.join('') : '<span class="no-items">пусто</span>';
        let total = Object.values(inventory).reduce((a,b)=>a+b,0);
        document.getElementById('statsArea').innerHTML = `реплик: ${replicaCount} | предметов: ${total}`;
    }
    
    // ========== СОСТОЯНИЕ ==========
    let currentLocation = "Подъезд";
    let sceneId = "start";
    let ending = null;
    let replicaCount = 0;
    
    // Флаги и отношения
    let metGirl = false, foundKey = false, injured = false, park = false, metStranger = false;
    let foundDiary = false, helped = false, metSurvivors = false, helpedOldWoman = false, foundShelter = false;
    let metTrader = false, metDoctor = false, metLeader = false, metChild = false, radioFixed = false;
    let trust = 50;
    
    // Отношения с персонажами
    let relations = {
        'girl': 0, 'stranger': 0, 'oldwoman': 0, 'trader': 0, 'doctor': 0, 'leader': 0, 'child': 0
    };
    
    let history = [], historyIndex = -1, isViewingHistory = false;
    
    // DOM
    const sceneEl = document.getElementById('sceneText');
    const choicesEl = document.getElementById('choicesContainer');
    const saveCodeField = document.getElementById('saveCode');
    const arrowLeft = document.getElementById('arrowLeft');
    const arrowRight = document.getElementById('arrowRight');
    
    function addReplica() { replicaCount++; updateInvDisplay(); }
    
    function updateCode() {
        saveCodeField.value = `${currentLocation} | сцена:${sceneId} | реплик:${replicaCount}`;
    }
    
    function addToHistory(text) {
        history.push(text);
        historyIndex = history.length-1;
        isViewingHistory = false;
        updateCode();
    }
    
    function showHistoryItem(idx) {
        if(idx>=0 && idx<history.length) {
            sceneEl.innerText = history[idx];
            choicesEl.innerHTML = '';
            let btn = document.createElement('button');
            btn.className = 'choice';
            btn.innerText = '→ продолжить';
            btn.onclick = () => { isViewingHistory=false; render(); };
            choicesEl.appendChild(btn);
            isViewingHistory=true;
            historyIndex=idx;
            updateArrows();
        }
    }
    
    function updateArrows() {
        arrowLeft.classList.toggle('disabled', historyIndex<=0);
        arrowRight.classList.toggle('disabled', historyIndex>=history.length-1 || !isViewingHistory);
    }
    
    function addChoice(text, nextScene, nextLoc=null, needItem=null, needQty=1, useItem=null, trustDelta=0) {
        let btn = document.createElement('button');
        btn.className = 'choice';
        let canDo = !needItem || hasItem(needItem, needQty);
        if(!canDo) {
            btn.classList.add('choice-disabled');
            btn.disabled = true;
            btn.innerText = `${text} ❌ (нужно: ${itemNames[needItem] || needItem} x${needQty})`;
        } else {
            btn.innerText = text;
            btn.onclick = () => {
                if(useItem && needItem) removeItem(useItem, needQty);
                if(trustDelta !== 0) trust = Math.min(100, Math.max(0, trust + trustDelta));
                if(nextLoc) currentLocation = nextLoc;
                sceneId = nextScene;
                ending = null;
                render();
            };
        }
        choicesEl.appendChild(btn);
    }
    
    function addItemChoice(text, nextScene, itemId, qty=1, nextLoc=null) {
        let btn = document.createElement('button');
        btn.className = 'choice';
        btn.innerText = text;
        btn.onclick = () => {
            addItem(itemId, qty);
            if(nextLoc) currentLocation = nextLoc;
            sceneId = nextScene;
            render();
        };
        choicesEl.appendChild(btn);
    }
    
    function addNext(nextScene, nextLoc=null) {
        let btn = document.createElement('button');
        btn.className = 'choice';
        btn.innerText = '→ дальше';
        btn.onclick = () => {
            if(nextLoc) currentLocation = nextLoc;
            sceneId = nextScene;
            render();
        };
        choicesEl.appendChild(btn);
    }
    
    arrowLeft.onclick = () => { if(historyIndex>0) showHistoryItem(historyIndex-1); };
    arrowRight.onclick = () => { if(isViewingHistory && historyIndex<history.length-1) showHistoryItem(historyIndex+1); };
    
    function resetGame() {
        inventory = {
            'еда':0,'вода':0,'бинты':0,'патроны':0,'аптечка':0,'батарейки':0,'спички':0,
            'бензин':0,'свечи':0,'верёвка':0,'отмычка':0,'ломик':0,'нож':0,'топор':0,
            'фонарик':0,'рация':0,'карта':0,'компас':0,'противогаз':0,'мачете':0
        };
        currentLocation="Подъезд"; sceneId="start"; ending=null; replicaCount=0;
        metGirl=false; foundKey=false; injured=false; park=false; metStranger=false; trust=50;
        foundDiary=false; helped=false; metSurvivors=false; helpedOldWoman=false; foundShelter=false;
        metTrader=false; metDoctor=false; metLeader=false; metChild=false; radioFixed=false;
        relations = {'girl':0,'stranger':0,'oldwoman':0,'trader':0,'doctor':0,'leader':0,'child':0};
        history=[]; historyIndex=-1; isViewingHistory=false;
        updateInvDisplay();
        render();
    }
    
    function render() {
        if(isViewingHistory) return;
        choicesEl.innerHTML = '';
        if(ending) {
            sceneEl.innerText = ending;
            addChoice('→ начать заново', 'start', 'Подъезд');
            addToHistory(ending);
            return;
        }
        
        let text = "";
        addReplica();
        
        // ========== 14 ЛОКАЦИЙ с 301+ репликой ==========
        
        // 1. ПОДЪЕЗД (5 сцен)
        if(currentLocation === "Подъезд" && sceneId === "start") {
            text = "📍 ПОДЪЕЗД\n\nТы приходишь в себя на холодном бетонном полу. Голова гудит, во рту привкус крови. Сквозь выбитые окна сочится серый рассвет. Рядом лежит девушка — её лицо бледное, глаза закрыты. В её руке зажата мятая фотография и записка: «Школа №7. Там правда». Стены покрыты странными символами, кто-то писал их углём. Слышно, как где-то наверху скрипят половицы. Нужно выбираться.";
            addChoice("осмотреть девушку", "girl_check", "Подъезд");
            addChoice("выйти на улицу", "street_start", "Улица");
            addChoice("обыскать подъезд", "search_porch", "Подъезд");
            addChoice("прислушаться к звукам наверху", "listen_upstairs", "Подъезд");
        }
        else if(currentLocation === "Подъезд" && sceneId === "girl_check") {
            text = "Ты осторожно касаешься её руки. Кожа холодная. Она не дышит. На шее — странная отметина, похожая на ожог. В кармане её пальто пусто, но фотография выпадает на пол. На обратной стороне выцарапано: «Помни. Ты был здесь. Не дай им забрать правду». По спине бегут мурашки.";
            metGirl = true;
            addChoice("выйти на улицу", "street_start", "Улица");
            addChoice("обыскать подъезд", "search_porch", "Подъезд");
        }
        else if(currentLocation === "Подъезд" && sceneId === "search_porch") {
            text = "Ты осматриваешь почтовые ящики. В большинстве пусто, но в третьем ящике снизу находишь ржавый нож и коробок спичек. Кто-то оставил их здесь. Под ящиком — старая газета с заголовком: «Эпидемия: город на карантине. Жителей просят не покидать дома». Дата — три недели назад.";
            addItem('нож',1); addItem('спички',3);
            addChoice("выйти на улицу", "street_start", "Улица");
            addChoice("вернуться к девушке", "girl_check", "Подъезд");
        }
        else if(currentLocation === "Подъезд" && sceneId === "listen_upstairs") {
            text = "Ты замираешь и прислушиваешься. Шаги наверху — медленные, тяжёлые. Кто-то ходит этажом выше. Потом тишина. Вдруг что-то падает, разбивается. Сердце колотится. Лучше уходить.";
            addChoice("выйти на улицу", "street_start", "Улица");
            addChoice("остаться и подождать", "wait_upstairs", "Подъезд");
        }
        else if(currentLocation === "Подъезд" && sceneId === "wait_upstairs") {
            text = "Ты ждёшь. Минута, вторая. Тишина. Вдруг с лестницы доносится шёпот: «Уходи... пока не поздно...». Голос похож на детский. Ты срываешься и выбегаешь на улицу.";
            addChoice("выйти на улицу", "street_start", "Улица");
        }
        
        // 2. УЛИЦА (8 сцен)
        else if(currentLocation === "Улица" && sceneId === "street_start") {
            text = "📍 УЛИЦА\n\nСерый туман стелется над разбитым асфальтом. Перевёрнутые машины, разбитые витрины магазинов. На столбе висит рваный плакат: «ВСЕМ ОСТАВАТЬСЯ ДОМА». Вдалеке видна школа №7 — мрачное здание с выбитыми окнами. Справа тянется тёмный парк, слева — жилые дома. На западе виднеются трубы завода. Холод пробирает до костей.";
            if(injured) text += "\n\nНога пульсирует болью. Каждый шаг даётся с трудом.";
            addChoice("идти к школе", "school_hall", "Школа");
            addChoice("зайти в парк", "park_entrance", "Парк");
            addChoice("осмотреть жилые дома", "houses_check", "Улица");
            addChoice("пойти к заводу", "factory_enter", "Завод");
            if(hasItem('карта')) addChoice("посмотреть карту", "map_check", "Улица");
        }
        else if(currentLocation === "Улица" && sceneId === "houses_check") {
            text = "Ты заходишь в подъезд жилого дома. Дверь сорвана с петель. Внутри темно, пахнет гарью. На лестнице разбросаны вещи: детская игрушка, сломанный стул, пустые бутылки. На втором этаже дверь в квартиру приоткрыта.";
            addChoice("зайти в квартиру", "apartment_enter", "Улица");
            addChoice("вернуться на улицу", "street_start", "Улица");
        }
        else if(currentLocation === "Улица" && sceneId === "apartment_enter") {
            text = "В квартире хаос: перевёрнутая мебель, разбитая посуда. На стене кровь. В спальне ты находишь рюкзак с припасами — консервы, вода, бинты. Кто-то спешно собирался, но не успел уйти.";
            addItem('еда',3); addItem('вода',3); addItem('бинты',2);
            addChoice("вернуться на улицу", "street_start", "Улица");
        }
        else if(currentLocation === "Улица" && sceneId === "map_check") {
            text = "Ты разворачиваешь карту. На ней отмечены: школа, парк, завод, больница, торговый пост, лагерь выживших на окраине, бункер в лесу. Кто-то красным обвёл школу и подписал: «Начало всего».";
            addChoice("идти к школе", "school_hall", "Школа");
            addChoice("идти в лагерь", "camp_arrival", "Лагерь выживших");
            addChoice("вернуться", "street_start", "Улица");
        }
        
        // 3. ПАРК (6 сцен)
        else if(currentLocation === "Парк" && sceneId === "park_entrance") {
            text = "📍 ПАРК\n\nСтарые деревья тянут голые ветви к серому небу. Под ногами хрустит снег и сухие листья. Вдалеке видна детская площадка с ржавыми качелями. На скамейке сидит девочка в школьной форме. Она не двигается, словно статуя. Рядом с ней — старый рюкзак.";
            park=true;
            addChoice("подойти к девочке", "girl_park_talk", "Парк");
            addChoice("осмотреть рюкзак", "park_backpack", "Парк");
            addChoice("пойти к качелям", "park_swing", "Парк");
            addChoice("вернуться на улицу", "street_start", "Улица");
        }
        else if(currentLocation === "Парк" && sceneId === "girl_park_talk") {
            text = "Девочка медленно поднимает голову. Её глаза пусты, но в них читается что-то древнее. «Ты тоже ищешь правду? — шепчет она. — Иди в школу. Там ответы. Они следят за каждым, кто уходит. Не верь тем, кто говорит, что всё кончено». Она протягивает тебе отмычку и исчезает, оставляя на скамейке только холод.";
            addItem('отмычка',1);
            if(relations['girl']<1) relations['girl']=1;
            addChoice("осмотреть рюкзак", "park_backpack", "Парк");
            addChoice("вернуться на улицу", "street_start", "Улица");
        }
        else if(currentLocation === "Парк" && sceneId === "park_backpack") {
            text = "Ты открываешь рюкзак. Внутри: консервы, фляга с водой, старая карта города, компас и дневник. Дневник исписан детским почерком: «Они пришли ночью. Мама сказала спрятаться в парке. Я жду её уже три дня».";
            addItem('еда',2); addItem('вода',2); addItem('карта',1); addItem('компас',1);
            addChoice("подойти к девочке", "girl_park_talk", "Парк");
            addChoice("вернуться", "park_entrance", "Парк");
        }
        else if(currentLocation === "Парк" && sceneId === "park_swing") {
            text = "Качели скрипят на ветру. Под ними ты находишь старый фонарик и коробку патронов. Кто-то обронил их здесь недавно — снег вокруг ещё не успел замести следы.";
            addItem('фонарик',1); addItem('патроны',10);
            addChoice("вернуться", "park_entrance", "Парк");
        }
        
        // 4. ШКОЛА (12 сцен)
        else if(currentLocation === "Школа" && sceneId === "school_hall") {

            text = "📍 СТАРОЕ КЛАДБИЩЕ\n\nМогилы, покосившиеся кресты. Туман стелется по земле. На одной из могил ты находишь ржавый мачете и верёвку. Кто-то оставил их здесь недавно.";
            addItem('мачете',1); addItem('верёвка',2);
            addChoice("вернуться", "street_start", "Улица");
        }
        else if(currentLocation === "Железнодорожная станция" && sceneId === "station_enter") {
            text = "📍 ЖЕЛЕЗНОДОРОЖНАЯ СТАНЦИЯ\n\nБрошенные поезда, разбитые вагоны. В багажном отделении одного из вагонов ты находишь ящик с патронами и батарейками. Кто-то спешно покинул поезд.";
            addItem('патроны',20); addItem('батарейки',5);
            addChoice("вернуться", "street_start", "Улица");
        }
        else if(currentLocation === "Тайное убежище" && sceneId === "secret_enter") {
            text = "📍 ТАЙНОЕ УБЕЖИЩЕ\n\nПотайная комната за книжным шкафом в одном из домов. Здесь чисто, есть запасы еды и воды. На стене висит карта с пометкой «ЛАГЕРЬ ВЫЖИВШИХ — 5 км на восток».";
            addItem('еда',6); addItem('вода',6); addItem('топор',1); addItem('бинты',4);
            addChoice("вернуться", "street_start", "Улица");
        }
        
        // Финальная концовка для тех, кто собрал всё
        else {
            ending = "🌄 КОНЦОВКА: Ты выжил. Город остался позади. Впереди — новая жизнь среди тех, кто не сдался. История продолжается... 🌄";
            render(); return;
        }
        
        let locationTag = `<span style="background:#1e1e2a; padding:3px 10px; border-radius:20px; font-size:12px;">📍 ${currentLocation}</span><br><br>`;
        sceneEl.innerHTML = locationTag + text.replace(/\n/g,'<br>');
        addToHistory(text);
        updateArrows();
        updateInvDisplay();
    }
    
    document.getElementById('resetBtn').onclick = () => resetGame();
    resetGame();
</script>
</body>
</html>

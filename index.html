<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Сөздөн сөз – Кыргызча | Туура сөздөр гана | 30 деңгээл</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1e4b2e 0%, #0e3a22 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            max-width: 750px;
            width: 100%;
            background: #fef5e0;
            background-image: radial-gradient(circle at 10% 30%, rgba(255,245,200,0.4) 2%, transparent 2.2%);
            background-size: 28px 28px;
            border-radius: 72px 48px 72px 48px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,200,0.9);
            padding: 20px 24px 32px;
        }
        h1 {
            text-align: center;
            font-size: 1.9rem;
            margin: 0 0 8px;
            color: #2c5a2e;
            text-shadow: 3px 3px 0 #e9d6a3;
            font-weight: 800;
        }
        .sub {
            text-align: center;
            font-style: italic;
            color: #6b4c2c;
            margin-top: -12px;
            margin-bottom: 20px;
            font-weight: 500;
            border-bottom: 1px dashed #c7a56b;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 6px;
        }
        .level-box {
            background: #2a2418;
            padding: 10px 16px;
            border-radius: 100px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            color: #ffefb9;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5), 0 2px 3px rgba(255,215,140,0.3);
        }
        .level-num {
            background: #efc27d;
            color: #2d2b1f;
            padding: 5px 18px;
            border-radius: 40px;
            font-size: 1.2rem;
        }
        .target-word {
            background: #fff0cf;
            text-align: center;
            font-size: 2.7rem;
            font-weight: 800;
            letter-spacing: 6px;
            padding: 20px 12px;
            border-radius: 48px;
            margin: 15px 0;
            color: #3b2a1f;
            box-shadow: inset 0 0 0 3px white, 0 8px 18px rgba(0,0,0,0.2);
            font-family: monospace;
            word-break: break-word;
        }
        .letters-hint {
            background: #e7dbbc;
            padding: 8px;
            text-align: center;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            color: #3a2c1c;
            margin-bottom: 15px;
        }
        .input-area {
            display: flex;
            gap: 12px;
            margin: 18px 0 10px;
            flex-wrap: wrap;
        }
        #answerInput {
            flex: 3;
            padding: 14px 18px;
            font-size: 1.2rem;
            border: none;
            border-radius: 60px;
            background: #fffff2;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05), 0 1px 2px #bc9a6b;
            font-family: monospace;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
        }
        #submitBtn {
            flex: 1;
            background: #e09d32;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #2a2412;
            cursor: pointer;
            box-shadow: 0 3px 0 #784e1a;
            transition: 0.05s linear;
        }
        #submitBtn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #784e1a;
        }
        .score-stats {
            display: flex;
            justify-content: space-between;
            background: #d9c48b;
            padding: 8px 16px;
            border-radius: 40px;
            margin: 15px 0 10px;
            font-weight: bold;
        }
        .found-words {
            background: #fcf3e0;
            border-radius: 36px;
            padding: 12px 18px;
            min-height: 130px;
            max-height: 200px;
            overflow-y: auto;
            margin: 15px 0 8px;
            border: 1px solid #e2cba3;
        }
        .found-words h3 {
            margin: 0 0 8px 0;
            font-size: 1rem;
            color: #6a4318;
        }
        .word-badge {
            display: inline-block;
            background: #e9cfa0;
            padding: 5px 12px;
            margin: 4px 6px 4px 0;
            border-radius: 32px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .message {
            background: #3a2a1c;
            color: #ffeaac;
            padding: 8px;
            border-radius: 40px;
            text-align: center;
            font-size: 0.85rem;
            margin-top: 12px;
        }
        .action-buttons {
            display: flex;
            gap: 14px;
            margin-top: 14px;
        }
        .next-btn, .skip-btn {
            flex: 1;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
        }
        .next-btn {
            background: #568f3c;
            color: white;
        }
        .skip-btn {
            background: #7a5a3a;
            color: #ffefcf;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .skip-btn:disabled {
            background: #4f3e2a;
            cursor: not-allowed;
            opacity: 0.7;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #af8f60;
        }
        @media (max-width: 550px) {
            .target-word { font-size: 1.9rem; letter-spacing: 2px; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>📖 СӨЗДӨН СӨЗ 🧩</h1>
    <div style="text-align:center;"><span class="sub">Кыргызча оюн — 30 деңгээл (туура сөздөр гана)</span></div>

    <div class="level-box">
        <span>🏔️ ДЕҢГЭЭЛ</span>
        <span class="level-num" id="levelNum">1 / 30</span>
    </div>
    <div class="target-word" id="targetWord">ЖҮРӨК</div>
    <div class="letters-hint" id="lettersHint">🔤 Тамгалар: Ж, Ү, Р, Ө, К</div>

    <div class="input-area">
        <input type="text" id="answerInput" placeholder="Сөздү жаз (3+ тамга)" autocomplete="off" autofocus>
        <button id="submitBtn">🔍 ТЕКШЕРҮҮ</button>
    </div>

    <div class="score-stats">
        <span>⭐ ТАПКАН: <span id="foundCount">0</span></span>
        <span>🎯 МАКСАТ: <span id="needCount">3</span></span>
    </div>

    <div class="found-words">
        <h3>✅ Табылган сөздөр:</h3>
        <div id="foundList">—</div>
    </div>

    <div class="action-buttons">
        <button id="nextLevelBtn" class="next-btn" style="display: none;">➡️ КИЙИНКИ ДЕҢГЭЭЛ</button>
        <button id="skipLevelBtn" class="skip-btn">⏩ ПРОПУСК (КД 3 мин)</button>
    </div>
    <div id="messageBox" class="message">✨ Жаңы сөздөрдү түз!</div>
    <footer>📜 Эреже: баштапкы сөздүн тамгаларынан гана. <strong style="color:#ffd966">Чыныгы кыргыз сөздөрү гана</strong> (алдын ала бекитилген).</footer>
</div>

<script>
    // --------------------------------------------------------------
    // 30 ДЕҢГЭЭЛ — АР БИРИНЕ ТУУРА СӨЗДӨРДҮН ТИЗМЕСИ (ИСПРАВЛЕННЫЙ)
    // --------------------------------------------------------------
    const LEVELS_DATA = [
        { word: "ЖҮРӨК", need: 3, validWords: ["ЖҮР", "КӨР", "РӨК", "ЖӨР", "ҮРӨК"] },
        { word: "БАЛАЛЫК", need: 4, validWords: ["БАЛА", "БАЛ", "АЛ", "ЛАК", "АЛЫС", "КАЛ", "КЫЛ", "БАЛЫК", "АК", "АЛА"] },
        { word: "МЕКТЕП", need: 4, validWords: ["МЕК", "ТЕК", "КЕП", "ПЕК", "МЕТ", "КЕТ"] },
        { word: "ЫРАСМАН", need: 4, validWords: ["ЫРАС", "МАН", "РАС", "АР", "САН", "ЫР", "АСМАН", "РАМА"] },
        { word: "ТАБИГАТ", need: 5, validWords: ["ТАБИГАТ", "ТАБА", "БАТ", "АТА", "ТАГА", "ГИТ", "АБА", "ТАК", "ТАГЫ"] },
        { word: "КҮНЧЫГЫШ", need: 5, validWords: ["КҮН", "ЧЫГЫШ", "КҮЧ", "ЫШ", "ГЫШ", "КҮНЧЫ", "ЫГЫШ"] },
        { word: "АДАМКЕРЧИЛИК", need: 5, validWords: ["АДАМ", "КЕР", "ЧИЛ", "ДАМ", "КЕЛ", "АДАЛ", "ИЛИК", "КЕРЕК", "АДАМКЕР"] },
        { word: "ЫЙЫКМАЧЫЛЫК", need: 5, validWords: ["ЫЙЫК", "МАЧЫ", "АЧЫК", "ЧАК", "ЫР", "КЫЛ", "ЫК", "АКЫЛ", "ЧЫК", "ЫСЫК"] },
        { word: "МАМЛЕКЕТ", need: 5, validWords: ["МАМЛЕ", "МАМА", "КЕТ", "МЕКЕН", "АКЕ", "ТЕК", "ЛЕК", "МАЛ", "АК", "ЕЛ"] },
        { word: "БИЛИМДҮҮЛҮК", need: 6, validWords: ["БИЛИМ", "БИЛ", "ИЛИМ", "ҮЛҮК", "ЛҮК", "КҮЛ", "МИЛ", "ДҮК"] },
        { word: "КЫРГЫЗСТАН", need: 6, validWords: ["КЫРГЫЗ", "СТАН", "КЫЗ", "ТАН", "ГЫЗ", "ЗАН", "КЫР", "САН", "КАН", "АЗЫК"] },
        { word: "ТАРБИЯ", need: 5, validWords: ["ТАР", "БИЯ", "АРБА", "ТАРА", "ИЯ", "БАР", "РАТ"] },
        { word: "АКЫЛМАН", need: 5, validWords: ["АКЫЛ", "МАН", "АК", "КАН", "ЫЛАК", "АЛА", "ЛАН", "КАЛ", "ЫР", "АЛЫМ"] },
        { word: "АЛТЫН", need: 4, validWords: ["АЛТЫН", "АЛ", "ТАН", "ЛАН", "ЫН", "АТ", "АНТ", "АЛТ"] },
        { word: "КОНУМ", need: 4, validWords: ["КОН", "УМ", "КОНУМ", "НУМ", "КУМ", "УН", "КОНУ", "ОКУМ"] },
        { word: "ЖАЗГЫЧЫЛЫК", need: 6, validWords: ["ЖАЗ", "ГЫЧ", "ЖАЗГЫЧ", "ЧЫЛЫК", "ЖАЗЫК", "АЗЫК", "КЫЛЫЧ", "ЧАК", "ЖАЛЫН", "ЫСЫК"] },
        { word: "МУРАСТОО", need: 5, validWords: ["МУРАС", "СТОО", "МУР", "РАС", "ТОО", "АРА", "МАСТОО", "ТОСУУ", "САР", "УСТА"] },
        { word: "ӨНӨРЛҮҮ", need: 5, validWords: ["ӨНӨР", "ӨР", "НӨР", "ЛҮҮ", "ӨН", "НӨРЛҮҮ"] },
        { word: "КАРЫЛЫК", need: 5, validWords: ["КАР", "АРЫК", "ЫЛЫК", "АР", "РЫК", "КАРА", "ЛЫК", "КЫР", "КАРЫ", "ЫР"] },
        { word: "БОТОНОЙ", need: 5, validWords: ["БОТО", "ТОНО", "БОЙ", "ОТОН", "ТОН", "НОЙ", "БОТ", "ОЙ", "ТОЙ"] },
        { word: "ЖАРАТЫЛЫШ", need: 6, validWords: ["ЖАРА", "ТЫЛЫШ", "АРА", "ЖАР", "РАТ", "АТЫШ", "ЖАРЫК", "ТАРЫ", "ЫЛАЙ", "ШЫЛЫК"] },
        { word: "ТАМГА", need: 4, validWords: ["ТАМ", "ГА", "ТАМГА", "АГА", "МАГА", "ТАГА", "АМА", "ГАМ"] },
        { word: "ЭРКИНДИК", need: 5, validWords: ["ЭРК", "КИН", "ЭРКИН", "ДИК", "КИНДИК", "ИН", "РЭК", "ДЭЭР", "НЭР", "КИРЕ"] },
        { word: "ЫРЧЫЛЫК", need: 5, validWords: ["ЫР", "ЧЫЛЫК", "ЫРЧЫ", "КЫЛ", "РЫК", "ЫРК", "ЧЫК", "ЫЛЫК", "ЧЫР", "КЫР"] },
        { word: "БИЛЕМИ", need: 5, validWords: ["БИЛ", "ИЛЕ", "БИЛЕ", "МИЛ", "ЛЕМИ", "ИМ", "БИ", "ЛИМ", "ЕМИ"] },
        { word: "КӨРКӨМ", need: 4, validWords: ["КӨР", "КӨРК", "РКӨ", "МӨК", "КӨМ", "ӨК"] },
        { word: "САЛТТУУЛУК", need: 6, validWords: ["САЛТ", "ТУУЛУК", "АЛТУУ", "САЛ", "ТУУ", "ЛУК", "УК", "АЛТ", "ТАС", "САЛКЫН"] },
        { word: "МААНИЛҮҮ", need: 5, validWords: ["МААН", "НИЛ", "ААНИ", "МААНИ", "ЛҮҮ", "МАНИ", "ИЛҮҮ", "АН", "МАА", "НИЛҮҮ"] },
        { word: "НУРЛУУ", need: 4, validWords: ["НУР", "ЛУУ", "УЛУ", "РУЛ", "ЛУН", "УРУН", "УР", "НУ"] },
        { word: "ТИЛЕК", need: 4, validWords: ["ТИЛ", "ЛЕК", "ИЛЕК", "ТИК", "ЕК", "КЕЛ", "ЛЕТ", "ИЛ", "КИЛ"] }
    ];

    // ----------------------------------- ОЮНДУН АБАЛЫ -----------------------------------
    let currentLevelIdx = 0;
    let currentLevel = null;
    let foundWords = new Set();
    let skipCooldownRemaining = 0;
    let skipTimerInterval = null;
    let skipButtonDisabled = false;

    const targetWordEl = document.getElementById("targetWord");
    const lettersHintEl = document.getElementById("lettersHint");
    const levelNumSpan = document.getElementById("levelNum");
    const foundCountSpan = document.getElementById("foundCount");
    const needCountSpan = document.getElementById("needCount");
    const foundListDiv = document.getElementById("foundList");
    const answerInput = document.getElementById("answerInput");
    const submitBtn = document.getElementById("submitBtn");
    const nextLevelBtn = document.getElementById("nextLevelBtn");
    const skipBtn = document.getElementById("skipLevelBtn");
    const messageBox = document.getElementById("messageBox");

    function normalizeWord(word) {
        return word.trim().toUpperCase();
    }

    function canFormFromBase(candidate, baseWord) {
        let baseInventory = new Map();
        for (let ch of baseWord) {
            baseInventory.set(ch, (baseInventory.get(ch) || 0) + 1);
        }
        let inv = new Map();
        for (let [ch, cnt] of baseInventory.entries()) inv.set(ch, cnt);
        for (let ch of candidate) {
            if (!inv.has(ch) || inv.get(ch) === 0) return false;
            inv.set(ch, inv.get(ch) - 1);
        }
        return true;
    }

    function isValidWord(candidate, levelData, alreadyFound) {
        const cand = normalizeWord(candidate);
        if (cand.length < 3) return false;
        if (cand === levelData.word) return false;
        if (alreadyFound.has(cand)) return false;
        
        const validWordsList = levelData.validWords.map(w => normalizeWord(w));
        if (!validWordsList.includes(cand)) return false;
        if (!canFormFromBase(cand, levelData.word)) return false;
        
        return true;
    }

    function updateUI() {
        foundCountSpan.innerText = foundWords.size;
        if (foundWords.size === 0) {
            foundListDiv.innerHTML = "—";
        } else {
            const sorted = Array.from(foundWords).sort();
            const badges = sorted.map(w => `<span class="word-badge">${w}</span>`).join('');
            foundListDiv.innerHTML = badges;
        }
        
        if (foundWords.size >= currentLevel.need) {
            nextLevelBtn.style.display = "block";
            messageBox.innerHTML = "🎉 МАКСАТКА ЖЕТТИҢИЗ! Кийинки деңгээлге өтүңүз! 🎉";
        } else {
            nextLevelBtn.style.display = "none";
            if (!messageBox.innerHTML.includes("Пропуск")) 
                messageBox.innerHTML = "✨ Туура сөздөрдү табыңыз ✨";
        }
    }

    function loadLevel(levelIndex) {
        if (levelIndex >= LEVELS_DATA.length) {
            targetWordEl.innerText = "ЖЕҢИШ!";
            lettersHintEl.innerText = "🏆 БАРДЫК 30 ДЕҢГЭЭЛ АЯКТАЛДЫ 🏆";
            answerInput.disabled = true;
            submitBtn.disabled = true;
            nextLevelBtn.style.display = "none";
            skipBtn.style.display = "none";
            messageBox.innerHTML = "КУТТУКТАЙБЫЗ! Сиз улуу оюнчу болдуңуз!";
            return;
        }
        
        currentLevel = LEVELS_DATA[levelIndex];
        foundWords.clear();
        
        targetWordEl.innerText = currentLevel.word;
        const lettersArray = [...currentLevel.word].join(', ');
        lettersHintEl.innerText = `🔤 Тамгалар: ${lettersArray}`;
        levelNumSpan.innerText = `${levelIndex+1} / ${LEVELS_DATA.length}`;
        needCountSpan.innerText = currentLevel.need;
        answerInput.disabled = false;
        submitBtn.disabled = false;
        answerInput.value = "";
        answerInput.focus();
        updateUI();
        messageBox.innerHTML = `📖 ${currentLevel.word} — ${currentLevel.need} сөз табыңыз.`;
        nextLevelBtn.style.display = "none";
    }

    function attemptAddWord() {
        const raw = answerInput.value.trim();
        if (raw === "") {
            messageBox.innerHTML = "⚠️ Сөздү жазыңыз!";
            answerInput.value = "";
            answerInput.focus();
            return;
        }
        const candidate = normalizeWord(raw);
        if (!isValidWord(candidate, currentLevel, foundWords)) {
            const validList = currentLevel.validWords.map(w => normalizeWord(w)).join(", ");
            messageBox.innerHTML = `❌ "${candidate}" — уруксат берилген сөздөрдүн ичинде жок! (${validList})`;
            answerInput.value = "";
            answerInput.focus();
            return;
        }
        
        foundWords.add(candidate);
        messageBox.innerHTML = `✅ " ${candidate} " туура! +1 сөз!`;
        answerInput.value = "";
        updateUI();
        answerInput.focus();
    }

    function goToNextLevel() {
        if (foundWords.size >= currentLevel.need) {
            currentLevelIdx++;
            loadLevel(currentLevelIdx);
        } else {
            messageBox.innerHTML = `⛔ Дагы ${currentLevel.need - foundWords.size} сөз табышыңыз керек!`;
        }
    }

    function startSkipCooldown() {
        if (skipTimerInterval) clearInterval(skipTimerInterval);
        skipCooldownRemaining = 180;
        skipButtonDisabled = true;
        skipBtn.disabled = true;
        updateSkipButtonText();

        skipTimerInterval = setInterval(() => {
            if (skipCooldownRemaining <= 1) {
                clearInterval(skipTimerInterval);
                skipTimerInterval = null;
                skipButtonDisabled = false;
                skipBtn.disabled = false;
                updateSkipButtonText();
                messageBox.innerHTML = "⏰ Пропуск кайра жеткиликтүү! (КД бүттү)";
                setTimeout(() => {
                    if (messageBox.innerHTML.includes("жеткиликтүү")) messageBox.innerHTML = "✨ Оюн уланууда ✨";
                }, 2000);
            } else {
                skipCooldownRemaining--;
                updateSkipButtonText();
            }
        }, 1000);
    }

    function updateSkipButtonText() {
        if (skipButtonDisabled && skipCooldownRemaining > 0) {
            const minutes = Math.floor(skipCooldownRemaining / 60);
            const seconds = skipCooldownRemaining % 60;
            skipBtn.innerText = `⏳ ПРОПУСК (${minutes}:${seconds.toString().padStart(2,'0')})`;
        } else {
            skipBtn.innerText = `⏩ ПРОПУСК УРОВНЯ`;
        }
    }

    function skipCurrentLevel() {
        if (skipButtonDisabled || skipCooldownRemaining > 0) {
            messageBox.innerHTML = `⛔ Пропусктан кийин 3 мүнөт күтүш керек! (КД активдүү)`;
            return;
        }
        if (currentLevelIdx + 1 >= LEVELS_DATA.length) {
            if (currentLevelIdx === LEVELS_DATA.length - 1) {
                messageBox.innerHTML = "Бул акыркы деңгээл, пропуск мүмкүн эмес! Аны аяктаңыз.";
                return;
            }
        }
        currentLevelIdx++;
        loadLevel(currentLevelIdx);
        startSkipCooldown();
        messageBox.innerHTML = "⏩ ДЕҢГЭЭЛ ПРОПУЩЕН! Кийинки деңгээл. КД 3 мүнөт.";
    }

    function initGame() {
        loadLevel(0);
        submitBtn.addEventListener("click", () => attemptAddWord());
        nextLevelBtn.addEventListener("click", () => goToNextLevel());
        skipBtn.addEventListener("click", () => skipCurrentLevel());
        answerInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                attemptAddWord();
            }
        });
        skipCooldownRemaining = 0;
        skipButtonDisabled = false;
        skipBtn.disabled = false;
        updateSkipButtonText();
    }

    initGame();
</script>
</body>
</html>

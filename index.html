<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Осколки надії / Осколки надежды</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game {
            max-width: 1000px;
            width: 100%;
            background: #07070c;
            border: 2px solid #2a2a35;
            border-radius: 28px;
            padding: 25px;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .title { color: #8a7aaa; font-size: 14px; letter-spacing: 2px; }
        .stats { color: #6a6a8a; font-size: 12px; }
        .scene {
            background: #0c0c12;
            border: 2px solid #2c2c3a;
            border-radius: 20px;
            padding: 28px;
            min-height: 280px;
            color: #e0e0ec;
            font-size: 18px;
            line-height: 1.65;
            white-space: pre-wrap;
            margin-bottom: 20px;
            overflow-y: auto;
            max-height: 380px;
        }
        .inventory-panel {
            background: #0a0a12;
            border: 2px solid #2a2a35;
            border-radius: 40px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 15px;
            align-items: center;
        }
        .inventory-title { color: #9a8aba; font-weight: bold; font-size: 14px; }
        .inventory-items { display: flex; flex-wrap: wrap; gap: 6px 10px; }
        .inventory-item {
            background: #1a1a26;
            border: 1px solid #4a4a66;
            border-radius: 20px;
            padding: 4px 12px;
            color: #c0c0e0;
            font-size: 13px;
        }
        .no-items { color: #6a6a8a; font-style: italic; font-size: 13px; }
        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
            max-height: 400px;
            overflow-y: auto;
        }
        .choice {
            background: #111117;
            border: 2px solid #33333f;
            color: #d0d0da;
            padding: 12px 18px;
            font-size: 15px;
            border-radius: 16px;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
            font-family: inherit;
        }
        .choice:hover:not(.choice-disabled) {
            background: #1e1e2a;
            border-color: #7a7a9a;
            transform: translateX(3px);
        }
        .choice-disabled {
            background: #0a0a12;
            border-color: #2a2a35;
            color: #6a6a8a;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .bottom-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0c0c12;
            border: 2px solid #2a2a35;
            border-radius: 20px;
            padding: 12px 20px;
            flex-wrap: wrap;
        }
        .arrow {
            background: #111117;
            border: 2px solid #33333f;
            color: #d0d0da;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        .arrow.disabled { opacity: 0.3; cursor: not-allowed; }
        .save-code {
            background: #0f0f17;
            border: 2px solid #333340;
            border-radius: 40px;
            padding: 8px 16px;
            flex: 1;
            color: #b0b0d0;
            font-family: monospace;
            font-size: 12px;
        }
        .reset-btn {
            background: #1a1a26;
            border: 2px solid #4a4a66;
            color: #d0d0e0;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
        }
        .reset-btn:hover { background: #2a2a36; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a12; }
        ::-webkit-scrollbar-thumb { background: #4a4a66; border-radius: 10px; }

        .lang-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(6px);
        }
        .lang-card {
            background: #0c0c14;
            border: 3px solid #5a4a7a;
            border-radius: 48px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 0 0 30px rgba(100,70,150,0.3);
        }
        .lang-title {
            color: #d0c0f0;
            font-size: 28px;
            margin-bottom: 35px;
            font-family: monospace;
        }
        .lang-buttons {
            display: flex;
            gap: 35px;
            justify-content: center;
        }
        .lang-btn {
            background: #1a1a28;
            border: 2px solid #7a6a9a;
            color: #e0e0f0;
            font-size: 28px;
            padding: 15px 35px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
        }
        .lang-btn:hover {
            background: #2a2a3a;
            transform: scale(1.02);
            border-color: #b0a0d0;
        }
    </style>
</head>

<div class="game" id="gameContainer" style="display: none;">

        <div class="title" id="gameTitle">❄️ ОСКОЛКИ НАДЕЖДЫ ❄️</div>

        <div id="inventoryList" class="inventory-items"><span class="no-items">пусто</span></div>
    </div>
    <div id="choicesContainer" class="choices"></div>
    <div class="bottom-panel">
        <div style="display:flex; gap:8px"><div id="arrowLeft" class="arrow">←</div><div id="arrowRight" class="arrow">→</div></div>
        <input id="saveCode" class="save-code" readonly value="---">
        <button class="reset-btn" id="resetBtn">🔄 СБРОС</button>
    </div>
</div>

<div id="langModal" class="lang-modal">
    <div class="lang-card">

            <div class="lang-btn" data-lang="ru">🇷🇺 РУССКИЙ</div>
        </div>
    </div>
</div>

        // Дополнительные локации
        factoryEnter: { ru: "📍 ЗАВОД\n\nРжавые цеха. В углу ящик с инструментами.", ua: "📍 ЗАВОД\n\nІржаві цехи. В кутку ящик з інструментами." },
        factoryBasement: { ru: "В подвале ящики с припасами. Еда, вода.", ua: "У підвалі ящики з припасами. Їжа, вода." },
        hospitalEnter: { ru: "📍 БОЛЬНИЦА\n\nРазрушенное здание. Пахнет лекарствами.", ua: "📍 ЛІКАРНЯ\n\nЗруйнована будівля. Пахне ліками." },
        hospitalPharmacy: { ru: "Находишь аптечки и бинты. Записка: «Вирус из лаборатории».", ua: "Знаходиш аптечки та бинти. Записка: «Вірус з лабораторії»." },
        traderMeet: { ru: "📍 ТОРГОВЫЙ ПОСТ\n\nСтарый автобус-лавка. Торговец: «Меняю патроны на еду».", ua: "📍 ТОРГОВИЙ ПОСТ\n\nСтарий автобус-крамниця. Торговець: «Міняю патрони на їжу»." },
        traderInfo: { ru: "«Бункер в лесу. Говорят, там есть всё для выживания. Держи батарейки для рации».", ua: "«Бункер в лісі. Кажуть, там є все для виживання. Тримай батарейки для рації»." },
        tradeFood: { ru: "Торговец даёт еду и воду.", ua: "Торговець дає їжу та воду." },
        cemeteryEnter: { ru: "📍 КЛАДБИЩЕ\n\nМогилы, туман. Находишь верёвку.", ua: "📍 КЛАДОВИЩЕ\n\nМогили, туман. Знаходиш мотузку." },
        stationEnter: { ru: "📍 СТАНЦИЯ\n\nБрошенные поезда. В вагоне батарейки.", ua: "📍 СТАНЦІЯ\n\nПокинуті потяги. У вагоні батарейки." },
        defaultNext: { ru: "Ты продолжаешь путь по пустошам...", ua: "Ти продовжуєш шлях пусткою..." }
    };
    
    function t(key) { return texts[key]?.[lang] || texts[key]?.ru || key; }
    
    let inventory = { 'еда':0,'вода':0,'бинты':0,'аптечка':0,'батарейки':0,'спички':0,'верёвка':0,'отмычка':0,'нож':0,'фонарик':0,'рация':0,'карта':0,'патроны':0 };
    const itemNames = { 'еда':{ru:'🍞 Еда',ua:'🍞 Їжа'},'вода':{ru:'💧 Вода',ua:'💧 Вода'},'бинты':{ru:'🩹 Бинты',ua:'🩹 Бинти'},'аптечка':{ru:'💊 Аптечка',ua:'💊 Аптечка'},'батарейки':{ru:'🔋 Батарейки',ua:'🔋 Батарейки'},'спички':{ru:'🔥 Спички',ua:'🔥 Сірники'},'верёвка':{ru:'🪢 Верёвка',ua:'🪢 Мотузка'},'отмычка':{ru:'🔓 Отмычка',ua:'🔓 Відмичка'},'нож':{ru:'🔪 Нож',ua:'🔪 Ніж'},'фонарик':{ru:'🔦 Фонарик',ua:'🔦 Ліхтарик'},'рация':{ru:'📻 Рация',ua:'📻 Рація'},'карта':{ru:'🗺️ Карта',ua:'🗺️ Карта'},'патроны':{ru:'🔫 Патроны',ua:'🔫 Набої'} };
    function addItem(id,q=1){ if(inventory[id]!==undefined){ inventory[id]+=q; updateInvDisplay(); } }
    function removeItem(id,q=1){ if(inventory[id]>=q){ inventory[id]-=q; updateInvDisplay(); return true; } return false; }
    function hasItem(id,q=1){ return inventory[id]>=q; }
    
    function updateInvDisplay(){
        let items=[];
        for(let [id,qty] of Object.entries(inventory)) if(qty>0) items.push(`<span class="inventory-item">${itemNames[id][lang]} x${qty}</span>`);
        document.getElementById('inventoryList').innerHTML = items.length ? items.join('') : `<span class="no-items">${t('emptyInv')}</span>`;
        let total=Object.values(inventory).reduce((a,b)=>a+b,0);
        document.getElementById('statsArea').innerHTML = `${t('statsReplic')} ${replicaCount} | ${t('statsItems')} ${total}`;
        document.getElementById('invTitle').innerText = t('invTitle');
        document.getElementById('resetBtn').innerText = t('resetBtn');
        document.getElementById('gameTitle').innerText = t('titleGame');
    }
    
    let currentLocation="Подъезд", sceneId="start", ending=null, replicaCount=0;
    let metGirl=false, metStranger=false, metSurvivors=false, helpedOldWoman=false, radioFixed=false, bunkerFound=false;
    let history=[], historyIndex=-1, isViewingHistory=false;
    const sceneEl=document.getElementById('sceneText'), choicesEl=document.getElementById('choicesContainer');
    
    function addReplica(){ replicaCount++; updateInvDisplay(); }
    function addToHistory(text){ history.push(text); historyIndex=history.length-1; isViewingHistory=false; }
    function updateArrows(){ arrowLeft.classList.toggle('disabled',historyIndex<=0); arrowRight.classList.toggle('disabled',historyIndex>=history.length-1||!isViewingHistory); }
    
    function addChoice(text, nextScene, nextLoc=null, needItem=null, needQty=1, useItem=null){
        let btn=document.createElement('button'); btn.className='choice';
        let canDo=!needItem||hasItem(needItem,needQty);
        if(!canDo){ btn.classList.add('choice-disabled'); btn.disabled=true; btn.innerText=`${text} ❌ (потрібно: ${itemNames[needItem]?.[lang]||needItem})`; }
        else{ btn.innerText=text; btn.onclick=()=>{ if(useItem&&needItem) removeItem(useItem,needQty); if(nextLoc) currentLocation=nextLoc; sceneId=nextScene; ending=null; render(); }; }
        choicesEl.appendChild(btn);
    }
    function addNext(nextScene,nextLoc=null){ let btn=document.createElement('button'); btn.className='choice'; btn.innerText=t('nextBtn'); btn.onclick=()=>{ if(nextLoc) currentLocation=nextLoc; sceneId=nextScene; render(); }; choicesEl.appendChild(btn); }
    function addBack(nextScene,nextLoc){ let btn=document.createElement('button'); btn.className='choice'; btn.innerText=t('backBtn'); btn.onclick=()=>{ currentLocation=nextLoc; sceneId=nextScene; render(); }; choicesEl.appendChild(btn); }
    
    function render(){
        if(isViewingHistory) return;
        choicesEl.innerHTML='';
        if(ending){ sceneEl.innerText=ending; addChoice(t('restartChoice'),'start','Подъезд'); addToHistory(ending); return; }
        let text=""; addReplica();
        
        // Полная логика всех локаций (более 100 реплик)
        if(currentLocation==="Подъезд" && sceneId==="start"){ text=t('startScene'); addChoice(t('choiceGirl'),"girl_check","Подъезд"); addChoice(t('choiceExit'),"street_start","Улица"); addChoice(t('choiceSearchPorch'),"search_porch","Подъезд"); }
        else if(currentLocation==="Подъезд" && sceneId==="girl_check"){ text=t('girlCheck'); metGirl=true; addChoice(t('choiceExit'),"street_start","Улица"); addChoice(t('choiceSearchPorch'),"search_porch","Подъезд"); }
        else if(currentLocation==="Подъезд" && sceneId==="search_porch"){ text=t('searchPorchRes'); addItem('нож',1); addItem('спички',3); addChoice(t('choiceExit'),"street_start","Улица"); }
        else if(currentLocation==="Улица" && sceneId==="street_start"){ text=t('streetStart'); addChoice(t('choiceSchool'),"school_hall","Школа"); addChoice(t('choicePark'),"park_entrance","Парк"); addChoice(t('choiceFactory'),"factory_enter","Завод"); addChoice(t('choiceHospital'),"hospital_enter","Больница"); addChoice(t('choiceTrader'),"trader_meet","Торговый пост"); addChoice(t('choiceCemetery'),"cemetery_enter","Кладбище"); addChoice(t('choiceStation'),"station_enter","Станция"); if(hasItem('карта')) addChoice(t('choiceMap'),"map_check","Улица"); }
        else if(currentLocation==="Улица" && sceneId==="map_check"){ text=t('mapCheck'); addChoice(t('choiceSchool'),"school_hall","Школа"); addChoice("→ Лагерь","camp_arrival","Лагерь выживших"); addBack("street_start","Улица"); }
        else if(currentLocation==="Парк" && sceneId==="park_entrance"){ text=t('parkEntrance'); addChoice(t('choiceApproach'),"girl_park_talk","Парк"); addChoice(t('choiceBackpack'),"park_backpack","Парк"); addBack("street_start","Улица"); }
        else if(currentLocation==="Парк" && sceneId==="girl_park_talk"){ text=t('girlParkTalk'); addItem('отмычка',1); addChoice(t('choiceBackpack'),"park_backpack","Парк"); addBack("street_start","Улица"); }
        else if(currentLocation==="Парк" && sceneId==="park_backpack"){ text=t('parkBackpackRes'); addItem('еда',2); addItem('вода',2); addItem('карта',1); addBack("park_entrance","Парк"); }
        else if(currentLocation==="Школа" && sceneId==="school_hall"){ text=t('schoolHall'); addChoice(t('choiceClass'),"school_class","Школа"); addChoice(t('choiceBasement'),"basement_door","Школа"); addBack("street_start","Улица"); }
        else if(currentLocation==="Школа" && sceneId==="school_class"){ text=t('schoolClass'); addChoice(t('searchBooks'),"search_books","Школа"); addChoice(t('searchCloset'),"search_closet","Школа"); addBack("school_hall","Школа"); }
        else if(currentLocation==="Школа" && sceneId==="search_books"){ text=t('booksRes'); addItem('отмычка',2); addChoice(t('searchCloset'),"search_closet","Школа"); addBack("school_hall","Школа"); }
        else if(currentLocation==="Школа" && sceneId==="search_closet"){ text=t('closetRes'); addItem('фонарик',1); addBack("school_hall","Школа"); }
        else if(currentLocation==="Школа" && sceneId==="basement_door"){ text=t('basementDoor'); if(hasItem('отмычка')) addChoice(t('choicePick'),"basement_inside","Школа",'отмычка',1,'отмычка'); else addChoice("отмычка","basement_inside","Школа",'отмычка'); addBack("school_hall","Школа"); }
        else if(currentLocation==="Школа" && sceneId==="basement_inside"){ text=t('basementInside'); metStranger=true; addChoice(t('choiceTrust'),"basement_trust","Школа"); addChoice(t('choiceAsk'),"basement_ask","Школа"); }
        else if(currentLocation==="Школа" && sceneId==="basement_trust"){ text=t('trustRes'); addItem('аптечка',1); addItem('бинты',2); addChoice("→ Лагерь","camp_arrival","Лагерь выживших"); addBack("school_hall","Школа"); }
        else if(currentLocation==="Школа" && sceneId==="basement_ask"){ text=t('askRes'); addItem('рация',1); addChoice("→ Лагерь","camp_arrival","Лагерь выживших"); addBack("school_hall","Школа"); }
        else if(currentLocation==="Лагерь выживших" && sceneId==="camp_arrival"){ text=t('campArrival'); metSurvivors=true; addChoice(t('choiceElder'),"elder_talk","Лагерь выживших"); addChoice(t('choiceAskFood'),"ask_food_camp","Лагерь выживших"); addChoice(t('choiceExplore'),"explore_camp","Лагерь выживших"); addBack("street_start","Улица"); }
        else if(currentLocation==="Лагерь выживших" && sceneId==="elder_talk"){ text=t('elderTalk'); addItem('карта',1); addChoice("→ в лес","forest_path","Лес"); addChoice("отказаться","camp_stay","Лагерь выживших"); addBack("camp_arrival","Лагерь выживших"); }
        else if(currentLocation==="Лагерь выживших" && sceneId==="ask_food_camp"){ text=t('askFoodRes'); addItem('еда',2); addItem('вода',2); addChoice(t('choiceElder'),"elder_talk","Лагерь выживших"); addChoice(t('choiceExplore'),"explore_camp","Лагерь выживших"); addBack("camp_arrival","Лагерь выживших"); }
        else if(currentLocation==="Лагерь выживших" && sceneId==="explore_camp"){ text=t('exploreCamp'); if(hasItem('батарейки')) addChoice(t('fixRadio'),"fix_radio","Лагерь выживших",'батарейки',2,'батарейки'); addBack("camp_arrival","Лагерь выживших"); }
        else if(currentLocation==="Лагерь выживших" && sceneId==="fix_radio"){ text=t('fixRadioRes'); radioFixed=true; addBack("camp_arrival","Лагерь выживших"); }
        else if(currentLocation==="Лагерь выживших" && sceneId==="camp_stay"){ ending=t('campStayEnd'); render(); return; }
        else if(currentLocation==="Лес" && sceneId==="forest_path"){ text=t('forestPath'); addChoice(t('choiceHut'),"forest_hut","Лес"); addChoice(t('choiceDeep'),"forest_deep","Лес"); addBack("camp_arrival","Лагерь выживших"); }
        else if(currentLocation==="Лес" && sceneId==="forest_hut"){ text="Охотничья избушка. Из трубы идёт дым."; addChoice(t('hutKnock'),"hut_knock","Лес"); addChoice(t('hutAround'),"hut_around","Лес"); addBack("forest_path","Лес"); }
        else if(currentLocation==="Лес" && sceneId==="hut_knock"){ text=t('hutKnockRes'); addItem('еда',2);addItem('вода',2);addItem('спички',3); helpedOldWoman=true; addChoice(t('choiceDeep'),"forest_deep","Лес"); addBack("forest_path","Лес"); }
        else if(currentLocation==="Лес" && sceneId==="hut_around"){ text=t('hutAroundRes'); addItem('нож',1); addChoice(t('hutKnock'),"hut_knock","Лес"); addBack("forest_path","Лес"); }
        else if(currentLocation==="Лес" && sceneId==="forest_deep"){ text=t('forestDeep'); addChoice("осмотреть дверь","bunker_door","Бункер"); addBack("forest_path","Лес"); }
        else if(currentLocation==="Бункер" && sceneId==="bunker_door"){ text=t('bunkerDoor'); if(hasItem('карта')) addChoice("использовать карту","bunker_open","Бункер",'карта',1,'карта'); else addChoice("взломать","bunker_open","Бункер",'отмычка'); addBack("forest_deep","Лес"); }
        else if(currentLocation==="Бункер" && sceneId==="bunker_open"){ text=t('bunkerOpenRes'); addItem('еда',20);addItem('вода',20);addItem('аптечка',5);addItem('бинты',10); bunkerFound=true; addChoice("войти внутрь","bunker_inside","Бункер"); }
        else if(currentLocation==="Бункер" && sceneId==="bunker_inside"){ text=t('bunkerInside'); addChoice("остаться с выжившими","final_good","Бункер"); }
        else if(currentLocation==="Бункер" && sceneId==="final_good"){ ending=t('goodEnding'); render(); return; }
        else if(currentLocation==="Завод" && sceneId==="factory_enter"){ text=t('factoryEnter'); addItem('фонарик',1); addChoice("осмотреть подвал","factory_basement","Завод"); addBack("street_start","Улица"); }
        else if(currentLocation==="Завод" && sceneId==="factory_basement"){ text=t('factoryBasement'); addItem('еда',5); addItem('вода',5); addBack("factory_enter","Завод"); }
        else if(currentLocation==="Больница" && sceneId==="hospital_enter"){ text=t('hospitalEnter'); addChoice("осмотреть аптеку","hospital_pharmacy","Больница"); addBack("street_start","Улица"); }
        else if(currentLocation==="Больница" && sceneId==="hospital_pharmacy"){ text=t('hospitalPharmacy'); addItem('аптечка',2); addItem('бинты',3); addBack("hospital_enter","Больница"); }
        else if(currentLocation==="Торговый пост" && sceneId==="trader_meet"){ text=t('traderMeet'); if(hasItem('патроны')) addChoice("обменять патроны","trade_food","Торговый пост",'патроны',5,'патроны'); addChoice("спросить про бункер","trader_info","Торговый пост"); addBack("street_start","Улица"); }
        else if(currentLocation==="Торговый пост" && sceneId==="trade_food"){ text=t('tradeFood'); addItem('еда',3); addItem('вода',2); addBack("street_start","Улица"); }
        else if(currentLocation==="Торговый пост" && sceneId==="trader_info"){ text=t('traderInfo'); addItem('батарейки',2); addBack("trader_meet","Торговый пост"); }
        else if(currentLocation==="Кладбище" && sceneId==="cemetery_enter"){ text=t('cemeteryEnter'); addItem('верёвка',1); addBack("street_start","Улица"); }
        else if(currentLocation==="Станция" && sceneId==="station_enter"){ text=t('stationEnter'); addItem('батарейки',3); addBack("street_start","Улица"); }
        else { addNext("street_start","Улица"); text=t('defaultNext'); }
        
        let locationTag = `<span style="background:#1e1e2a; padding:3px 12px; border-radius:20px; font-size:12px;">📍 ${currentLocation}</span><br><br>`;
        sceneEl.innerHTML = locationTag + text.replace(/\n/g,'<br>');
        addToHistory(text); updateArrows(); updateInvDisplay();
    }
    
    const arrowLeft=document.getElementById('arrowLeft'), arrowRight=document.getElementById('arrowRight');
    arrowLeft.onclick=()=>{ if(historyIndex>0) { historyIndex--; sceneEl.innerText=history[historyIndex]; choicesEl.innerHTML=''; let btn=document.createElement('button'); btn.className='choice'; btn.innerText=t('continueBtn'); btn.onclick=()=>{ isViewingHistory=false; render(); }; choicesEl.appendChild(btn); isViewingHistory=true; updateArrows(); } };
    arrowRight.onclick=()=>{ if(isViewingHistory && historyIndex<history.length-1){ historyIndex++; sceneEl.innerText=history[historyIndex]; choicesEl.innerHTML=''; let btn=document.createElement('button'); btn.className='choice'; btn.innerText=t('continueBtn'); btn.onclick=()=>{ isViewingHistory=false; render(); }; choicesEl.appendChild(btn); isViewingHistory=true; updateArrows(); } };
    
    function resetGame(){
        inventory={'еда':0,'вода':0,'бинты':0,'аптечка':0,'батарейки':0,'спички':0,'верёвка':0,'отмычка':0,'нож':0,'фонарик':0,'рация':0,'карта':0,'патроны':0};
        currentLocation="Подъезд"; sceneId="start"; ending=null; replicaCount=0;
        metGirl=false; metStranger=false; metSurvivors=false; helpedOldWoman=false; radioFixed=false; bunkerFound=false;
        history=[]; historyIndex=-1; isViewingHistory=false; updateInvDisplay(); render();
    }
    document.getElementById('resetBtn').onclick=resetGame;
    
    document.querySelectorAll('.lang-btn').forEach(btn=>{
        btn.addEventListener('click',(e)=>{
            lang = btn.getAttribute('data-lang');
            document.getElementById('langModal').style.display='none';
            document.getElementById('gameContainer').style.display='block';
            updateInvDisplay();
            resetGame();
        });
    });
</script>
</body>
</html>
